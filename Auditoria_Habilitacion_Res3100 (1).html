<script>
// INSTRUCCIONES: Descargue este archivo y ábralo con doble clic en Chrome o Edge
// Los datos de la norma se cargan desde el Excel original de la Res. 3100/2019

// ── DATOS NORMA (criterios reales del Manual de Habilitación) ──
const EST=[{id:"TH",nombre:"Talento Humano"},{id:"IF",nombre:"Infraestructura"},{id:"DO",nombre:"Dotación"},{id:"MD",nombre:"Medicamentos, DM e Insumos"},{id:"PP",nombre:"Procesos Prioritarios"},{id:"HC",nombre:"Historia Clínica y Registros"},{id:"IN",nombre:"Interdependencia"}];

const T={
TH:["1. El talento humano en salud cuentan con los títulos de educación superior o certificados de aptitud ocupacional expedidos por la entidad educativa competente. En caso de títulos obtenidos en el extranjero, copia de la resolución de convalidación del MEN.","2. El talento humano en salud cuenta con copia de la resolución de autorización del ejercicio expedido por la autoridad competente o inscripción en el ReTHUS.","3. El prestador determina la cantidad necesaria de talento humano requerido para cada uno de los servicios ofertados y prestados, de acuerdo con la capacidad instalada, la oferta y demanda, la oportunidad en la prestación, tiempo de la atención y el riesgo. Este criterio no aplica para profesionales independientes.","4. El prestador que actúe como escenario de práctica formativa cuenta con: 4.1. Convenio vigente con la institución educativa autorizada. 4.2. Información documentada de los mecanismos de supervisión permanente del personal en entrenamiento. 4.3. Estudio de la capacidad instalada con el número máximo de estudiantes por programa y por jornada.","5. En servicios donde se atienden pacientes con enfermedades terminales, crónicas, degenerativas e irreversibles con manejo de dolor y cuidado paliativo, el profesional en medicina tratante cuenta con constancia de formación continua en el manejo de dolor y cuidado paliativo, cuando no sea especialista en esa área.","6. El talento humano de los servicios de atención del parto, cuidado intensivo y cuidado intermedio neonatal, pediátrico y adultos, cuentan con constancia de formación continua para la gestión del duelo.","7. En servicios donde se realicen imágenes diagnósticas por ultrasonido, cuenta con médico especialista en radiología e imágenes diagnósticas o médicos especialistas que en su formación hayan adquirido conocimientos del manejo e interpretación del espectro electromagnético y del ultrasonido.","8. Los profesionales de la medicina de los servicios de hospitalización (baja, mediana y alta complejidad), hospitalización paciente crónico, cuidados intensivos neonatales, pediátricos y adultos, urgencias y servicios del grupo quirúrgico en modalidad intramural, cuentan con certificación vigente de competencias esenciales para el cuidado de la donante expedida por el INS.","9. Las IPS con servicios de cuidado intensivo pediátrico y adulto que adicionalmente habiliten servicio quirúrgico de neurocirugía, tienen disponibilidad de coordinador operativo de trasplantes.","10. El talento humano de los servicios de consulta externa, internación y urgencias, cuentan con constancia de formación continua en la atención integral en salud de las personas víctimas de violencia sexual.","11. El talento humano de los servicios de transporte asistencial, atención prehospitalaria y urgencias, cuentan con constancia de formación continua en la atención a personas víctimas de ataques con agentes químicos.","12. Cuando en un servicio se realicen pruebas POCT (point of care testing), el talento humano que las realice, a excepción del profesional en bacteriología, cuenta con constancia de formación continua en la atención a personas víctimas de ataques con agentes químicos.","13.1.1. Procedimientos bajo sedación Grado I y II fuera de salas de cirugía: cuenta con profesional en medicina especialista en anestesiología, o profesional de la medicina o de odontología que sea el encargado de administrar el medicamento y realizar el monitoreo continuo del paciente.","13.1.2. Todos los profesionales, excepto el especialista en anestesiología, deben demostrar constancia de formación continua en soporte vital básico y sedación.","13.1.3. Para sedación con óxido nitroso en odontología, el profesional cuenta con constancia de formación continua para uso clínico y práctico de este gas.","13.2. Procedimientos bajo sedación Grado III fuera de salas de cirugía: cuenta con profesional de la medicina con especialidad médico-quirúrgica, quien será el responsable de administrar la sedación.","13.3. Procedimientos bajo sedación Grado IV fuera de salas de cirugía: cuenta con profesional de la medicina especialista en anestesiología, quien será el responsable de administrar la sedación.","13.4. Cuenta con profesional especialista en anestesiología cuando se traten pacientes con características particulares: poco colaboradores, edades extremas, enfermedades severas cardíacas/pulmonares/hepáticas/renales/SNC, alteración del grado de consciencia, obesidad mórbida, apnea del sueño, embarazadas, o quienes abusan del alcohol o drogas.","14. El talento humano que preste servicios bajo la modalidad telemedicina cuenta con constancia de formación continua en el manejo de tecnología utilizada por el prestador y los procesos inherentes a la prestación de servicios bajo esta modalidad."],
IF:["Edificaciones de uso exclusivo en salud: 1. Los servicios de urgencias, atención del parto, hospitalarios y de cirugía que realicen procedimientos quirúrgicos no ambulatorios, solo se pueden prestar en edificaciones de uso exclusivo de salud.","2. Los servicios de urgencias, cirugía y del grupo de internación, así como donde se realice el proceso de esterilización, deben contar con ambiente de aseo de uso exclusivo.","3. Cuando en una edificación de uso exclusivo de salud funcione más de un prestador con servicios de consulta externa y apoyo diagnóstico, cada prestador cuenta con infraestructura separada delimitada físicamente. Pueden compartir: aseo, salas de espera y unidades sanitarias.","4. Las edificaciones donde se presten servicios de urgencias y del grupo de internación, cuentan con tanque de almacenamiento de agua que garantice mínimo 24 horas de servicio continuo, calculado con 600 lt por cama/camilla al día.","5. Cuando el prestador cuente con más de una infraestructura vinculadas funcionalmente, lo harán mediante túnel o puente cubierto, o muro colindante con acceso de uso exclusivo. Requisitos: 5.1. Ancho que permita movilización de camas, camillas, sillas de ruedas y equipos. 5.2. Piso uniforme antideslizante con pasamanos a ambos lados. 5.3. Aprobado por la norma urbanística de la jurisdicción.","Edificaciones de uso mixto: 6. Cuando en una edificación de uso mixto funcione más de un prestador, cada uno cuenta con infraestructura separada y delimitada físicamente. Pueden compartir salas de espera y unidades sanitarias.","7. En edificaciones de uso mixto pueden funcionar prestadores que oferten servicios de consulta externa, apoyo diagnóstico y complementación terapéutica y servicios quirúrgicos que realicen exclusivamente procedimientos de cirugía ambulatoria.","8. Los prestadores ubicados en edificaciones de hasta tres pisos y que funcionen en segundo o tercer nivel, cuentan con ascensor, rampa o sistema alternativo de elevación. El sistema alternativo NO puede usarse cuando se presten servicios hospitalarios, cirugía, urgencias o atención del parto.","9. Los sistemas alternativos de elevación deben: 9.1. No interferir con el acceso y evacuación por escaleras. 9.2. Estar disponibles para acceso y evacuación. 9.3. Su manejo sea autónomo. 9.4. Garanticen seguridad durante su uso.","10. Las edificaciones con más de tres pisos cuentan con ascensor.","11. En edificaciones con servicios de internación, atención del parto, quirúrgicos o urgencias para movilización de pacientes en camilla, la cabina del ascensor tiene dimensiones interiores mínimas de 2.20m de profundidad y 1.20m de ancho.","12. Si se tienen escaleras o rampas, el piso es uniforme y antideslizante, con pasamanos de preferencia a ambos lados y protecciones laterales hacia espacios libres.","13. Las edificaciones donde se presten servicios de salud cuentan con suministro de agua, energía eléctrica, conexión a la red de alcantarillado y sistemas de comunicaciones.","14. En edificaciones con servicios de cirugía, atención del parto, laboratorio clínico, urgencias, gestión pretransfusional, diálisis, hospitalarios, imágenes diagnósticas, vacunación, servicio farmacéutico y los que requieran cadena de frío, cuentan con planta eléctrica.","15. El prestador que utilice equipos generadores de radiaciones ionizantes cuenta con licencia de práctica médica vigente expedida por la entidad competente.","16. El prestador que utilice fuentes radiactivas cuenta con autorización vigente de empleo de material radiactivo expedida por la entidad reguladora competente.","17. Cada prestador cuenta con el concepto sanitario que dé cumplimiento a la normatividad sanitaria vigente en aspectos como agua para consumo humano, gestión de residuos, control de vectores, orden y aseo, condiciones locativas. Cuando los servicios de apoyo son contratados con terceros, dichos proveedores deben contar con el concepto sanitario correspondiente.","Generalidades de los ambientes: 18. Las áreas y ambientes de todos los servicios de salud cuentan con ventilación natural o artificial.","19. Las áreas de circulación están libres de obstáculos de manera que permitan la movilización de pacientes, talento humano, usuarios y equipos biomédicos.","20. Los ambientes y áreas deben permitir la instalación y movilización de equipos biomédicos y personal necesarios para la atención del paciente en condiciones de rutina o de emergencia.","21. En los servicios del grupo quirúrgico, los ambientes y áreas clasificados como no restringidos y semi-restringidos, deben señalizarse mediante demarcación permanente en piso con material lavable y resistente: 21.1. Verde: áreas no restringidas. 21.2. Amarillo: áreas semi-restringidas. 21.3. Roja: áreas restringidas.","22. Cada uno de los pisos o niveles de la edificación cuenta con señalización y planos indicativos de las rutas de evacuación, salidas de emergencia y puntos de encuentro, visible al público en general.","23. Si el prestador no tiene habilitado el servicio de gestión pretransfusional pero realiza procedimientos de transfusión sanguínea, tiene disponibilidad de un área con iluminación y ventilación para la ubicación de la dotación requerida según los componentes sanguíneos a transfundir.","24. Cuando un prestador realice procedimientos bajo sedación fuera de salas de cirugía, tiene disponibilidad de área o ambiente para la recuperación de pacientes que puede ser la misma área donde se realiza el procedimiento, garantizando la privacidad del usuario.","25. El prestador que realice el proceso de esterilización cuenta con: 25.1. Ambiente de recibo de material contaminado. 25.2. Ambiente de lavado. 25.3. Ambiente de secado. 25.4. Ambiente de empaque. 25.5. Ambiente de esterilización. 25.6. Ambiente para almacenamiento de material estéril. 25.7. Mesón de trabajo con poceta. 25.8. Lavamanos cuando el proceso se realice fuera del servicio de salud.","26. El prestador que contrate el proceso de esterilización cuenta con: 26.1. Ambiente para lavado, limpieza, desinfección y entrega de material limpio al proveedor. 26.2. Ambiente para la recepción y almacenamiento del material estéril.","27. El prestador que realice el proceso de esterilización en una central cuenta con ambientes señalizados unidireccionales y de circulación restringida: 27.1. Ambiente de recibo y lavado de material contaminado. 27.2. Ambiente limpio con: área de secado, empaque y esterilización. 27.3. Ambiente para almacenamiento de material estéril.","31. Sistema de alarma cuando se cuente con red de distribución de gases medicinales.","41. Las condiciones de orden, aseo, limpieza y desinfección son evidentes y responden a un proceso dinámico de acuerdo con los servicios prestados.","42. Los pisos deben ser resistentes a factores ambientales, continuos, antideslizantes, impermeables, lavables, sólidos, resistentes a procesos de lavado y desinfección. Cuando se tengan dilataciones y juntas, estas deben ser selladas.","43. Los cielo rasos o techos y paredes o muros deben ser impermeables, lavables, sólidos, resistentes a factores ambientales e incombustibles y de superficie lisa y continua.","44. En los servicios de cirugía, atención del parto, ambiente TPR, salas de procedimientos, consultorios donde se realicen procedimientos, servicios de internación en cuidado básico, intermedio e intensivo, urgencias, diálisis, hemodinamia, laboratorios, gestión pretransfusional, quimioterapia, consulta odontológica y los ambientes donde se requieran procesos de limpieza y asepsia más profundos, la unión entre paredes o muros y el piso debe ser en media caña.","45. En los servicios de cirugía, atención del parto, ambiente TPR y el ambiente de esterilización, la unión entre cielo raso y la pared y la unión entre paredes debe contar con media caña.","Modalidad extramural: 46. Cuando un prestador preste sus servicios exclusivamente en modalidad extramural, la sede cuenta con: 46.1. Ambiente para almacenamiento de medicamentos o dispositivos médicos cuando se requiera. 46.2. Ambiente para almacenamiento de equipos biomédicos. 46.3. Ambiente para archivo de historias clínicas y registros."],
DO:["1. El prestador cuenta con el registro de la relación de los equipos biomédicos requeridos para la prestación de servicios de salud. Este registro cuenta como mínimo con: 1.1. Nombre del equipo biomédico. 1.2. Marca. 1.3. Modelo. 1.4. Serie. 1.5. Registro sanitario para dispositivos médicos o permiso de comercialización para equipos biomédicos de tecnología controlada, cuando lo requiera. 1.6. Clasificación por riesgo, cuando el equipo lo requiera.","2. El prestador garantiza las condiciones técnicas de calidad de los equipos biomédicos, para lo cual cuenta con: 2.1. Programa de mantenimiento preventivo de los equipos biomédicos, que incluya el cumplimiento de las recomendaciones del fabricante o del protocolo de mantenimiento definido por el prestador. 2.2. Hoja(s) de vida del(los) equipo(s) biomédico(s), con los registros de los mantenimientos preventivos y correctivos.","3. El prestador cuenta con un programa de capacitación en el uso de dispositivos médicos cuando éstos lo requieran, el cual puede ser desarrollado por el fabricante, importador o por el mismo prestador.","4. La dotación de los servicios de salud está en concordancia con lo definido por el prestador en el estándar de procesos prioritarios.","5. La suficiencia de equipos biomédicos está relacionada con la frecuencia de uso de los mismos, incluyendo los tiempos del proceso de esterilización, cuando aplique.","6. El mantenimiento de los equipos biomédicos es ejecutado por el talento humano profesional, tecnólogo o técnico en áreas relacionadas. Este mantenimiento puede ser realizado directamente por el prestador o mediante contrato o convenio con un tercero.","7. Los prestadores que oferten servicios de salud en modalidad extramural no pueden elaborar ni adaptar dispositivos médicos sobre medida.","8. Los servicios de salud que requieren carro de paro, cuentan con: 8.1. Desfibrilador bifásico con sistema de visualización integrado, capacidad de cardioversión, marcapasos transcutáneo y paletas para adultos y pediátricas según aplique. 8.2. Resucitador pulmonar manual. 8.3. Aspirador o sistema de vacío. 8.4. Monitor de signos vitales con: trazado ECG, presión no invasiva, saturación de oxígeno, batería. 8.5. Laringoscopio con hojas rectas y curvas adulto o pediátrica según aplique. 8.6. Medicamentos, dispositivos médicos e insumos definidos por el prestador.","9. Las IPS con servicios de hospitalización, hospitalización paciente crónico, cuidado intensivo neonatal, pediátrico y adulto, urgencias y del grupo quirúrgico, en modalidad intramural, cuentan con equipos de telecomunicaciones de doble vía y conectividad para notificar a la Red de Donación y Trasplantes sobre la existencia de un posible donante.","10. Las IPS con servicios de cuidado intensivo pediátrico y adulto que adicionalmente habiliten el servicio quirúrgico de neurocirugía, cuentan con equipo biomédico para realizar pruebas auxiliares en el diagnóstico de muerte encefálica, según lo documentado en el estándar de procesos prioritarios.","11. En los sistemas centralizados de gases medicinales, se realiza el mantenimiento a los componentes del sistema por el personal capacitado por el fabricante.","12. El prestador que realice el proceso de esterilización cuenta con los equipos biomédicos y la dotación de acuerdo con el método utilizado.","13. Si el prestador no tiene habilitado el servicio de gestión pretransfusional pero realiza procedimientos de transfusión sanguínea, cuenta con: 13.1. Nevera o depósito frío para almacenamiento de sangre entre 1ºC y 6ºC con alarma audible. 13.2. Equipo para descongelar plasma con control de temperatura cuando se requiera. 13.3. Congelador para plasma o crioprecipitados por debajo de -18ºC con alarma audible cuando se requiera. 13.4. Agitador de plaquetas con control de temperatura entre 20ºC y 24ºC cuando se requiera. 13.5. Nevera para transporte de componentes sanguíneos con cadena de frío.","14. Los servicios de salud donde se realicen procedimientos bajo sedación fuera de salas de cirugía y monitorización electroencefalográfica con video y radio, cuentan con carro de paro.","15. En los servicios de los grupos quirúrgico, internación y el servicio de urgencias, el prestador cuenta con accesorios para garantizar empaque cerrado y transporte de los elementos sucios y limpios."],
MD:["1. El prestador lleva registros de todos los medicamentos para uso humano requeridos en la prestación de los servicios que oferte. Dichos registros cuentan con: 1.1. Principio activo. 1.2. Forma farmacéutica. 1.3. Concentración. 1.4. Lote. 1.5. Fecha de vencimiento. 1.6. Presentación comercial. 1.7. Unidad de medida. 1.8. Registro sanitario vigente o permiso expedido por el Invima.","2. Los dispositivos médicos de uso humano requeridos para la prestación de los servicios cuentan con información documentada de verificación y seguimiento de: 2.1. Descripción. 2.2. Marca. 2.3. Serie (cuando aplique). 2.4. Presentación comercial. 2.5. Registro sanitario vigente o permiso de comercialización del Invima. 2.6. Clasificación por riesgo. 2.7. Vida útil cuando aplique. 2.8. Lote. 2.9. Fecha de vencimiento.","3. Los reactivos de diagnóstico in vitro requeridos para la prestación de los servicios cuentan con información documentada de verificación y seguimiento de: 3.1. Nombre. 3.2. Marca. 3.3. Presentación comercial. 3.4. Registro sanitario vigente o permiso de comercialización del Invima. 3.5. Clasificación del riesgo sanitario. 3.6. Vida útil cuando aplique. 3.7. Fecha de vencimiento y lote.","4. El prestador cuenta con información documentada de los procesos generales según aplique, para: 4.1. Selección. 4.2. Adquisición. 4.3. Transporte. 4.4. Recepción. 4.5. Almacenamiento. 4.6. Conservación. 4.7. Control de fechas de vencimiento. 4.8. Control de cadena de frío. 4.9. Distribución. 4.10. Dispensación. 4.11. Devolución. 4.12. Disposición final. 4.13. Seguimiento al uso de medicamentos, dispositivos médicos, reactivos de diagnóstico in vitro y demás insumos asistenciales.","5. El prestador que realice actividades con medicamentos de control especial cuenta con la resolución de autorización vigente expedida por el Fondo Nacional de Estupefacientes o la entidad que haga sus veces.","6. El prestador cuenta con información documentada de la planeación y ejecución de los programas de farmacovigilancia, tecnovigilancia y reactivovigilancia, que garanticen el seguimiento al uso de medicamentos, dispositivos médicos y reactivos de diagnóstico in vitro, cuando aplique.","7. El prestador que cuente con reservas de medicamentos, dispositivos médicos, reactivos de diagnóstico in vitro y demás insumos asistenciales, debe garantizar que se almacenen en condiciones apropiadas de temperatura, humedad, ventilación, segregación y seguridad de acuerdo con las condiciones definidas por el fabricante.","8. Para la aplicación del protocolo de lavado de manos o higienización, los servicios de salud cuentan con los insumos de aseo, limpieza y secado que garanticen su cumplimiento.","9. La suficiencia de dispositivos médicos está relacionada con la frecuencia de uso de los mismos, incluyendo los tiempos del proceso de esterilización, cuando aplique.","10. El prestador cuenta con paquete para el manejo de derrames y rupturas de medicamentos, ubicado en un lugar de fácil acceso, visible y con adecuada señalización, disponible para su uso en los servicios y ambientes donde se requieran.","11. En los servicios donde se requiera carro de paro, los medicamentos, dispositivos médicos e insumos deben ser definidos por el prestador de acuerdo con la morbilidad, riesgos de complicaciones más frecuentes y lo documentado para el procedimiento de reanimación cerebro cardio pulmonar.","12. El prestador debe mantener condiciones de almacenamiento, conservación, control de fechas de vencimiento, uso y custodia de los medicamentos, dispositivos médicos e insumos contenidos en los carros de paro.","13. Si el prestador no tiene habilitado el servicio de gestión pretransfusional pero realiza procedimientos de transfusión, cuenta con convenio o contrato vigente con un banco de sangre certificado para el suministro de sangre, componentes sanguíneos y la realización de las pruebas pretransfusionales.","14. Cuando el prestador fabrique gases medicinales en su institución, cuenta con la certificación vigente de Buenas Prácticas de Manufactura expedida por el Invima.","15. En los servicios de transporte asistencial, atención prehospitalaria y urgencias cuenta con kit de emergencias para la atención a víctimas de ataques con agentes químicos."],
PP:["1. El prestador cuenta con una política de seguridad del paciente acorde con los lineamientos expedidos por el Ministerio de Salud y Protección Social.","2. El prestador realiza actividades encaminadas a gestionar la seguridad del paciente.","3. El prestador cuenta con un comité o instancia que orienta y promueve la política de seguridad del paciente, el control de infecciones y la optimización del uso de antibióticos cuando los prescriba o administre. En el caso de profesionales independientes podrá ser el mismo prestador.","4. El prestador adopta y realiza las siguientes prácticas seguras, según aplique a su servicio de salud y cuenta con información documentada para: 4.1. Asegurar la correcta identificación del paciente (mínimo dos identificadores: nombre completo y número de identificación). 4.2. Gestionar y desarrollar una adecuada comunicación entre las personas que atienden y cuidan a los pacientes con enfoques diferenciales. 4.3. Detectar, prevenir y reducir infecciones asociadas con la atención en salud (que incluya protocolo de higiene de manos). 4.4. Detectar, analizar y gestionar eventos adversos. 4.5. Garantizar la funcionalidad de los procedimientos de consentimiento informado. 4.6. Mejorar la seguridad en la utilización de medicamentos. 4.7. Prevenir y reducir la frecuencia de caídas. 4.8. Garantizar la atención segura de la gestante y el recién nacido. 4.9. Prevenir complicaciones asociadas a disponibilidad y manejo de sangre y transfusión sanguínea. 4.10. Prevenir úlceras por presión. 4.11. Mejorar la seguridad en los procedimientos quirúrgicos.","5. El prestador promueve la cultura de seguridad del paciente con un enfoque educativo no punitivo mediante: 5.1. Capacitación del personal en el tema de seguridad del paciente y en los principales riesgos de la atención. 5.2. Actividades donde se ilustra al paciente y sus allegados en el autocuidado de su seguridad.","6. El prestador cuenta con información documentada de las actividades y procedimientos que se realizan en el servicio mediante guías de práctica clínica (GPC), procedimientos de atención, protocolos de atención y otros documentos que el prestador determine. Dicha información incluye talento humano, equipos biomédicos, medicamentos y dispositivos médicos e insumos requeridos.","7. La información documentada es conocida mediante acciones de formación continua por el talento humano encargado y existe evidencia de su socialización.","8. Las guías de práctica clínica y protocolos a adoptar son en primera medida los que disponga el Ministerio de Salud y Protección Social. En caso de no estar disponibles o si existe nueva evidencia científica, el prestador adopta, adapta o desarrolla GPC o protocolos basados en evidencia científica.","9. El prestador de acuerdo con las patologías más frecuentes en el servicio define la guía o guías de práctica clínica a adoptar, o adaptar o desarrollar.","10. El prestador cuenta con información documentada de la adopción, o adaptación o desarrollo de guías de práctica clínica o protocolos basados en evidencia científica.","11. Los servicios de salud donde se atiendan pacientes con enfermedades terminales, crónicas, degenerativas e irreversibles a los cuales se determine el manejo del dolor y cuidado paliativo, cuentan con información documentada para su manejo.","12. El prestador cuenta con información documentada de: 12.1. Detección, prevención y disminución del riesgo de accidentes e incidentes de carácter radiológico. 12.2. Aseo, limpieza y desinfección de áreas y superficies. 12.3. Procedimiento de reanimación cerebro cardio pulmonar. 12.4. Acciones para prevenir flebitis infecciosas, químicas y mecánicas en servicios donde se realicen procedimientos de venopunción. 12.5. Aspectos de bioseguridad acordes con las condiciones y características del servicio. 12.6. Descontaminación por derrames de sangre u otros fluidos corporales. 12.7. Manejo de gases medicinales incluyendo atención de emergencias y sistema de alarma.","13. El prestador que realice el proceso de esterilización cuenta con información documentada de: Buenas prácticas de esterilización que describe: 13.1.1. Recibo de productos contaminados y entrega de material estéril. 13.1.2. Transporte. 13.1.3. Lavado, secado y lubricación. 13.1.4. Empaque. 13.1.5. Etiquetado. 13.1.6. Esterilización. 13.1.7. Almacenamiento. 13.1.8. Verificación de la integridad del material estéril. 13.1.9. Control de calidad.","14. Cuando un prestador contrate el proceso de esterilización con un tercero, cuenta con un contrato, convenio o acuerdo escrito entre las partes que incluya características de calidad de los productos, supervisión del estado de las instalaciones y aplicación de los procedimientos del tercero.","15. Los prestadores tienen definidos procedimientos que garanticen el cumplimiento del no reúso de dispositivos médicos cuando el fabricante así lo haya establecido.","17. Para la referencia de pacientes, el prestador cuenta con información documentada de: 17.1. Estabilización del paciente antes del traslado. 17.2. Medidas para el traslado. 17.3. Lista de chequeo de los documentos necesarios para el traslado (formato de referencia, resultados de apoyos diagnósticos, resumen de historia clínica, mecanismos tecnológicos para el proceso, talento humano responsable).","20. La IPS que cuente con servicios de consulta externa, internación o urgencias, cuenta con: 20.1. Documento del proceso institucional que orienta la atención en salud de las víctimas de violencias sexuales. 20.2. Documento que dé cuenta la conformación del equipo institucional para la atención integral en salud para las víctimas de violencias sexuales.","22. En los servicios de transporte asistencial, atención prehospitalaria y urgencias, se cuenta con documento del proceso que orienta la atención en salud a víctimas de ataques con agentes químicos.","26. Los servicios de salud que realicen pruebas de interés en salud pública deben inscribirse en el Registro de Laboratorios – RELAB.","27. Cuando el prestador realice pruebas POCT en un servicio habilitado cuenta con: 27.1. Información documentada sobre la toma, procesamiento, control de calidad y entrega de resultados. 27.2. Controles de calidad realizados por un servicio de laboratorio clínico propio o contratado. 27.3. Análisis de los reportes del control de calidad y toma de medidas preventivas y correctivas."],
HC:["1. Toda atención de primera vez a un usuario debe incluir el proceso de apertura de historia clínica. Todos los pacientes atendidos cuentan con historia clínica.","2. El prestador cuenta con procedimientos para utilizar una historia única y para el registro de entrada y salida de historias del archivo físico. Ello implica que el prestador cuente con un mecanismo para unificar la información de cada paciente y su disponibilidad para el equipo de salud.","3. Los medios electrónicos para la gestión de la historia clínica garantizan la confidencialidad y seguridad, así como el carácter permanente de registrar en ésta y en otros registros asistenciales, sin que se puedan modificar los datos una vez se guarden los registros.","4. Las historias clínicas cuentan con los componentes y los contenidos mínimos definidos en la normatividad que regula la materia.","5. La historia clínica y los registros asistenciales se diligencian en forma clara, legible, sin tachones, enmendaduras, intercalaciones, sin dejar espacios en blanco y sin utilizar siglas.","6. Cada anotación lleva la fecha y hora en la que se realiza, con el nombre completo y firma del autor de la misma.","7. El diligenciamiento de los registros de atención de la historia clínica se realiza simultánea o inmediatamente después de la atención en salud.","8. La historia clínica y demás registros son conservados en archivo único garantizando la custodia y confidencialidad de los documentos o registros protegidos legalmente por reserva.","9. El prestador cuenta con un procedimiento de consentimiento informado que incluye mecanismos para verificar su aplicación, para que el paciente o su responsable, aprueben o no documentalmente, el procedimiento e intervención en salud a que va a ser sometido, previa información de los beneficios, riesgos, alternativas e implicaciones del acto asistencial.","10. Cuando el prestador utilice mecanismos electrónicos para generar, recibir, almacenar o disponer datos de la historia clínica, debe avalar que el mecanismo utilizado cumple con características de autenticidad, fiabilidad, integridad y disponibilidad del documento, de acuerdo con la normatividad vigente. Para ello, el prestador presentará un documento firmado por un ingeniero de sistemas con tarjeta profesional vigente, certificando que el mecanismo cumple con la normatividad mencionada.","11.1. Registro de actividades documentadas y realizadas en el procedimiento de reúso de dispositivos médicos incluyendo el número de reúsos por cada dispositivo esterilizado (cuando el prestador realice el proceso de esterilización dentro del servicio y fuera de centrales de esterilización). 11.2. Registro de cargas. 11.3. Resultados del control de calidad. 11.4. Listas del contenido de los paquetes que se esterilizan. 11.5. Etiquetado de cada paquete que permita la trazabilidad de la esterilización.","12. Cuando se realicen procedimientos de transfusión de sangre o sus componentes, cuenta con los siguientes registros: 12.1. Información de los componentes sanguíneos. 12.2. Solicitud de los componentes sanguíneos. 12.3. Muestras tomadas para la realización de pruebas pretransfusionales. 12.4. Muestras remitidas al Banco de Sangre y resultado de las pruebas pretransfusionales. 12.5. Información postransfusional. 12.6. Informe ante la secretaría sobre estadística mensual de componentes sanguíneos transfundidos. 12.7. Temperaturas de los equipos biomédicos que lo requieran. 12.8. Entrega para incineración de bolsas de sangre y componentes sanguíneos descartados. 12.9. Transfusiones en la historia clínica del paciente con razón, producto, volumen y hora de la transfusión.","13. Las IPS con servicios en modalidad intramural para hospitalización, hospitalización paciente crónico, cuidados intensivos neonatales, pediátricos y adultos, urgencias y servicios del grupo quirúrgico, cuentan con: 13.1. Registro de donantes detectados. 13.3. Registros en la historia clínica de la información sobre el proceso de donación efectuado por los profesionales de salud inscritos ante el INS.","14. La historia clínica utilizada en la modalidad extramural es custodiada por el prestador y cuenta con los registros según la modalidad (domiciliaria, jornada de salud, unidad móvil)."],
IN:["1. Cuando el servicio interdependiente sea contratado, debe mediar un contrato o un acuerdo escrito entre las dos partes, en el que se establezca que el servicio interdependiente apoya el servicio principal, estableciendo como mínimo: 1.1. Calidad en la entrega de los productos. 1.2. Procedimientos documentados de atención en cada servicio independiente. 1.3. Tiempos de entrega de los productos. 1.4. Supervisión al contratista que garantice la seguridad del resultado del producto contratado.","2. Cuando fuera de salas de cirugía, se realicen procedimientos bajo sedación y monitorización electroencefalográfica con video y radio; el prestador tendrá disponibilidad del servicio de transporte asistencial."]
};

const SVC_DATA={
"CE-01":{nombre:"Consulta Externa General",grupo:"Consulta Externa",criterios:{TH:["Intramural/extramural: 1. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente. 2. Cuenta con el profesional de la salud de acuerdo con el servicio a ofertar. 3. Cuando se oferte la estrategia para el manejo de la ERA, disponibilidad de: 3.1. Profesional de la medicina. 3.2. Profesional de enfermería o terapia respiratoria o fisioterapia."],IF:["Intramural: 8. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente. 9. Cuenta con: 9.1. El tipo de consultorio de acuerdo con la oferta. 9.2. Sala de procedimientos cuando se requiera. 10. Disponibilidad de: 10.1. Sala de espera. 10.2. Mínimo una unidad sanitaria de uso mixto apta para personas con movilidad reducida cuando el prestador cuente con hasta dos consultorios. 10.3. Mínimo una unidad sanitaria discriminada por sexo apta para personas con movilidad reducida cuando el prestador cuente con más de dos consultorios."],DO:["Intramural: 19. El consultorio donde se realice examen físico cumple con los criterios de todos los servicios y adicionalmente cuenta con: 19.1. Camilla fija. 19.2. Escalerilla. 19.3. Tensiómetro adulto o pediátrico. 19.4. Fonendoscopio adulto o pediátrico. 19.5. Equipo de órganos de los sentidos. 19.6. Martillo de reflejos. 19.7. Tallímetro o infantómetro. 19.8. Cinta métrica. 19.9. Báscula grado médico o pesa bebé. 19.10. Termómetro cuando lo requiera. 19.11. Negatoscopio cuando se requiera."],MD:["32. Cumple con los criterios que le sean aplicables de todos los servicios. 33. Cuando se oferte la estrategia ERA, el ambiente cuenta con oxígeno medicinal."],PP:["35. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuando se realicen procedimientos, cuenta con información documentada de: 35.1. Procedimientos que se pueden realizar incluyendo los que requieran anestesia local y no impliquen anestesia regional ni general. 35.2. Información al paciente sobre: preparación, recomendaciones post procedimiento, controles, posibles complicaciones."],HC:["41. Cumple con los criterios que le sean aplicables de todos los servicios."],IN:["43. Cumple con los criterios que le sean aplicables de todos los servicios."]}},
"CE-02":{nombre:"Consulta Externa Especializada",grupo:"Consulta Externa",criterios:{TH:["1. Cumple con los criterios definidos para el servicio de consulta externa general y adicionalmente cuenta con: 1.1. Profesional de la salud con título de especialista, según los programas académicos autorizados por el MEN. 1.2. Para medicina alternativa y terapias alternativas y complementarias, cuenta con profesional de la salud con título de especialista en el ámbito de su disciplina."],IF:["6. Cumple con los criterios definidos para el servicio de consulta externa general, de acuerdo con la oferta. 7. El consultorio de las especialidades de ginecobstetricia y urología, cuenta con unidad sanitaria."],DO:["13. Cumple con los criterios definidos para el servicio de consulta externa general y adicionalmente: Los consultorios de los especialistas cuentan con la dotación necesaria para realizar los procedimientos documentados en el estándar de procesos prioritarios."],MD:["18. Cumple con los criterios que le sean aplicables de todos los servicios."],PP:["20. Cumple con los criterios definidos para el servicio de consulta externa general. 21. Adicionalmente para medicina y terapias alternativas cuenta con información documentada de: 21.1. Criterios explícitos sobre el tipo de procedimientos que se pueden y no pueden realizar. 21.2. Procedimientos para la información al paciente sobre preparación, recomendaciones, controles, posibles complicaciones."],HC:["26. Cumple con los criterios que le sean aplicables de todos los servicios."],IN:["28. No aplica para la consulta externa médica especializada. 29. Para la consulta odontológica especializada disponibilidad de: 29.1. Servicio de radiología odontológica. 29.2. Transporte asistencial cuando se realicen procedimientos bajo sedación grado I y II."]}},
"CE-03":{nombre:"Vacunación",grupo:"Consulta Externa",criterios:{TH:["1. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 1.1. Profesional de la medicina o profesional de la enfermería. 2. Si se requiere personal adicional: 2.1. La administración de la vacuna: auxiliar de enfermería o auxiliar de salud pública bajo supervisión del profesional. 2.2. El manejo de la cadena de frío: puede disponer de auxiliar de enfermería, auxiliar en salud pública, gestor comunitario en salud (en zonas de dispersión geográfica), regente de farmacia o químico farmacéutico con experiencia en cadena de frío."],IF:["3. Cumple con los criterios que le sean aplicables de todos los servicios. 4. Consultorio o ambiente con: 4.1.1. Área para entrevista. 4.1.2. Área para alistamiento y administración de medicamentos biológicos. 4.1.3. Lavamanos. 4.2. Ambiente para almacenamiento y alistamiento: área de cadena de frío con mesón con poceta, grifo cuello de cisne o ducha teléfono. 4.3. Disponibilidad de sala de espera y unidades sanitarias discriminadas por sexo."],DO:["6. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 6.1. Refrigerador precalificado por la OMS para almacenamiento de vacunas. 6.2. Regulador o estabilizador electrónico de voltaje independiente. 6.3. Cajas de transporte y termos portavacunas precalificados por la OMS."],MD:["8. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente: Si se presenta interrupción de la cadena de frío, el prestador realiza notificación según el procedimiento establecido por el Invima."],PP:["9. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con información documentada de: 9.1. Vacunación segura. 9.2. Reporte y manejo de ESAVI (medición, análisis, reporte, gestión y monitoreo). 9.3. Vigilancia de inmunoprevenibles. 9.4. Seguimiento al PAI y seguimiento a cohortes. 9.5. Protocolo para la inmunización en casos de urgencia o para víctimas de violencia sexual. 9.6. Vacunación sin barreras."],HC:["11. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente: 11.1. Instrumentos de registros establecidos para el PAI bajo lineamientos del Ministerio. 11.2. Registro nominal de la información del PAI durante la atención. 11.3. Registro del carné de vacunación definido por el Ministerio."],IN:["12. No aplica."]}},
"AI-01":{nombre:"Urgencias",grupo:"Atención Inmediata",criterios:{TH:["Complejidad baja: 1. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 1.1. Profesional de la medicina con constancia de formación continua en soporte vital avanzado. 1.2. Auxiliar de enfermería con constancia de formación continua en soporte vital básico.\n\nComplejidad media: 5. Cuenta con: 5.1. Profesional de la medicina o especialista en medicina de urgencias o medicina familiar. 5.2. Profesional de la enfermería. 5.3. Auxiliar de enfermería con constancia en soporte vital básico. 6. Disponibilidad de: 6.1. Profesional de la medicina especialistas necesarios para la atención de las diversas patologías. 6.2. Profesional de terapia respiratoria o fisioterapeuta. 7. Los profesionales de la salud cuentan con constancia de formación continua en soporte vital avanzado.\n\nComplejidad alta: 11. Cuenta con: 11.1. Profesional de la medicina o especialista en medicina de urgencias o medicina familiar. 11.2. Profesional de la enfermería. 11.3. Auxiliar de enfermería con constancia en soporte vital básico. 11.4. Profesionales de la medicina especialistas necesarios para la atención de las diversas patologías."],IF:["Complejidades baja, mediana y alta: 15. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente. 16. El servicio de urgencias cuenta con: 16.1. Acceso directo desde el exterior de la edificación, localizado en el mismo piso o nivel donde funciona el servicio. 16.2. Ambientes y áreas definidas para la prestación del servicio, ubicadas en el mismo piso o nivel. 16.3. Circulación al interior del servicio que permite el flujo y desplazamiento expedito del personal y pacientes.\n\nComplejidad baja: 18. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 18.1. Sala de espera. 18.2. Unidades sanitarias discriminadas por sexo (mínimo una apta para personas con movilidad reducida). 18.3. Área para estacionamiento de camillas y sillas de ruedas. 18.4. Ambiente para descontaminación de pacientes con ducha teléfono y sistema de drenaje. 18.5. Consultorios con lavamanos. 18.6. Ambiente o área de Triage. 18.7. Estación de enfermería. 18.8. Sala de procedimientos (8m2). 18.9. Ambiente para atención de ERA cuando se requiera. 18.13. Ambiente de aislamiento. 18.14. Sala de reanimación (12m2) con mesón de trabajo con poceta y lavamanos. 18.15. Sala de observación adultos (6m2 por camilla) independiente por sexo. 18.16. Sala de observación pediátrica (6m2 por camilla). 18.18. Área señalizada y exclusiva para el acceso y parqueo de ambulancias."],DO:["Complejidad baja: 22. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 22.1. Instrumental gineco-obstétrico. 22.2. Equipo de atención de partos. 22.3. Elementos para sujeción física. 22.4. Equipo de toracostomía. 22.5. Carro de paro adulto y pediátrico. 22.6. Monitor de signos vitales con: ECG, presión no invasiva, saturación de oxígeno, temperatura, batería. 22.7. Oxímetro cuando no esté en el monitor. 22.8. Bomba de infusión. 22.9. Electrocardiógrafo de 12 derivaciones. 22.10. Nebulizador. 22.11. Oxígeno medicinal y succión."],MD:["Complejidades baja, mediana y alta: 34. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 34.1. Kit para recolección de evidencia forense y kit de profilaxis post exposición para VIH, ITS y anticoncepción de emergencia en víctimas de violencia sexual. 34.2. Oxígeno medicinal."],PP:["36. Cumple con los criterios definidos en todos los servicios y adicionalmente cuenta con información documentada de: 36.1. Ronda médica de evolución diaria. 36.2. Solicitud de interconsultas. 36.3. Entrega de turno. 36.4. Control de líquidos. 36.5. Plan de cuidados de enfermería. 36.6. Administración de medicamentos. 36.7. Sujeción de pacientes. 36.8. Toma de muestras de laboratorio. 36.9. Cateterismo vesical. 36.13. Selección y clasificación de pacientes - TRIAGE. 36.20. Plan Hospitalario para emergencias. 36.23. Atención en salud a víctimas de violencia sexual."],HC:["39. Cumple con los criterios que le sean aplicables de todos los servicios."],IN:["Complejidad baja: 41.1. Servicio de imágenes diagnósticas. 41.2. Servicio de laboratorio clínico. 41.3. Servicio de hospitalización. 41.4. Servicio farmacéutico. 41.5. Servicio de transporte asistencial.\n\nComplejidad mediana: 43.1. Servicio de imágenes diagnósticas. 43.2. Servicio de laboratorio clínico. 43.3. Servicio de hospitalización. 43.4. Servicio de cirugía. 43.5. Servicio farmacéutico.\n\nComplejidad alta: 46.1. Servicio de hospitalización. 46.2. Servicio de cirugía. 46.3. Servicio de cuidado intensivo adulto o pediátrico o neonatal. 46.4. Servicio farmacéutico. 46.5. Servicio de imágenes diagnósticas. 46.6. Servicio de laboratorio clínico. 46.7. Servicio de gestión pretransfusional."]}},
"IN-01":{nombre:"Hospitalización",grupo:"Internación",criterios:{TH:["COMPLEJIDAD BAJA: 1. Cumple con los criterios de todos los servicios y adicionalmente, disponibilidad de: 1.1. Profesional de la medicina. 1.2. Profesional de la enfermería. 1.3. Auxiliar de enfermería.\n\nCOMPLEJIDAD MEDIANA: 7. Cumple con los criterios de todos los servicios y adicionalmente cuenta con: 7.1. Profesional de la medicina. 7.2. Profesional de la enfermería. 7.3. Auxiliar de enfermería. 9. Disponibilidad de: 9.1. Profesional de la medicina especialista por cada especialidad ofertada. 9.2. Profesional de fisioterapia o terapia respiratoria. 9.3. Profesional de nutrición y dietética. 9.4. Profesional de la psicología.\n\nCOMPLEJIDAD ALTA: 13. Cumple con los criterios de hospitalización de mediana complejidad. 14. Disponibilidad del profesional especialista por cada especialidad ofertada, con permanencia mínima de 6 horas por cada 24 horas."],IF:["COMPLEJIDAD BAJA: 20. Cumple con los criterios de todos los servicios y adicionalmente: 20.1. Sala de procedimientos cuando el servicio cuente con habitaciones múltiples. 20.2. Estación de enfermería. 20.3. Área para estacionamiento de camillas y sillas de ruedas. 20.4. Habitación individual o múltiple: lavamanos, sanitario, ducha, área de guardarropa y sistema de llamado. La habitación individual tiene área mínima de 16m2. La habitación múltiple para adultos: máximo 4 camas con área libre mínima de 7m2 por cama separadas con barrera física. 20.5. Habitación individual de aislamiento: antecámara a manera de filtro con lavamanos, baño, área de guardarropa."],DO:["COMPLEJIDAD BAJA: 25. Cumple con los criterios de todos los servicios y adicionalmente: 25.1. Camas hospitalarias de acuerdo con la oferta. 25.2. Carro de paro (si el servicio está en varios pisos, cada piso cuenta con mínimo un carro de paro). 26. Disponibilidad de: 26.1. Bomba de infusión. 26.2. Glucómetro. 26.3. Silla de ruedas. 26.4. Tensiómetro. 26.5. Fonendoscopio. 26.6. Equipo de órganos de los sentidos. 26.7. Electrocardiógrafo. 26.8. Oxígeno medicinal."],MD:["35. Cumple con los criterios de todos los servicios y adicionalmente: 35.1. Oxígeno medicinal. 35.2. Dispositivos médicos e insumos según patología. 35.3. Medicamentos de acuerdo con inventario para uso en la atención. 36. Disponibilidad de kit para recolección de evidencia forense y kit de profilaxis post exposición para VIH, ITS y anticoncepción de emergencia en víctimas de violencia sexual."],PP:["42. Cumple con los criterios de todos los servicios y adicionalmente cuenta con información documentada de: 42.1. Criterios de ingreso y egreso al servicio. 42.2. Manejo de las principales causas de hospitalización. 42.3. Ronda médica diaria de evolución de pacientes. 42.4. Solicitud de interconsultas. 42.5. Entrega de turno. 42.6. Control de líquidos. 42.7. Plan de cuidados de enfermería. 42.8. Administración de medicamentos. 42.9. Sujeción de pacientes. 42.10. Toma de muestras de laboratorio. 42.11. Cateterismo vesical. 42.12. Preparación para toma de imágenes diagnósticas. 42.13. Ilustrar al paciente en el auto cuidado de la salud."],HC:["48. Cumple con los criterios que le sean aplicables de todos los servicios."],IN:["COMPLEJIDAD BAJA: 51.1. Servicio de laboratorio clínico. 51.2. Servicio de imágenes diagnósticas. 51.3. Servicio de transporte asistencial. 51.4. Servicio farmacéutico. 51.5. Servicios de apoyo (alimentación, lavandería y vigilancia).\n\nCOMPLEJIDAD MEDIANA: 53.1. Servicio de laboratorio clínico. 53.2. Servicio de imágenes diagnósticas. 53.3. Servicio farmacéutico. 53.4. Servicio de gestión pretransfusional.\n\nCOMPLEJIDAD ALTA: 55. Adicionalmente: Servicio de cirugía."]}},
"QX-01":{nombre:"Cirugía",grupo:"Quirúrgico",criterios:{TH:["1. Cumple con los criterios que le sean aplicables a todos los servicios y adicionalmente cuenta con: 1.1. Auxiliar en enfermería. 1.2. Profesional en Instrumentación quirúrgica para cada uno de los procedimientos que lo requieran. 2. Disponibilidad de: 2.1. Profesional de la medicina o de la odontología especialista según la oferta con permanencia durante los procedimientos quirúrgicos. 2.2. Profesional de la medicina especialista en anestesiología con permanencia durante los procedimientos, quien realizará solo un procedimiento a la vez. 5. Sala de recuperación - cuenta con: 5.1. Profesional de la Enfermería. 5.2. Auxiliar de Enfermería."],IF:["8. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con: 8.1. Área para recepción y entrega de pacientes. 8.2. Área para transferencia de camillas. 8.3. Vestidor para el talento humano que funciona como filtro, con unidad sanitaria y área para casilleros. 8.4. Ambiente para la recepción y almacenamiento de material estéril cuando no se cuenta con central de esterilización anexa. 8.5. Área o ambiente para inactivación y prelavado de instrumental. 8.6. Lavamanos quirúrgico en cantidad igual al número de salas de cirugía más uno. 8.7. Área o ambiente de ropa limpia. 8.8. Ambiente de ropa sucia. 9. Sala de Cirugía (20m2) que cuenta con: salida de oxígeno medicinal, salida de aire medicinal, sistema de vacío, alarma de gases medicinales, sistema de extracción de gases anestésicos. 10. Sala de recuperación localizada junto a las salas de cirugía: área para dos camillas por cada sala, puesto de enfermería, lavamanos, salida de oxígeno medicinal y sistema de vacío por camilla."],DO:["17. Cada sala de cirugía cuenta con: 17.1. Mesa para cirugía. 17.2. Mesa para instrumental quirúrgico. 17.3. Monitor de signos vitales con: ECG, presión no invasiva, saturación de oxígeno, capnografía, temperatura. 17.4. Máquina de anestesia cuando el procedimiento la requiera. 17.5. Lámpara quirúrgica. 17.6. Laringoscopio con hojas rectas y curvas. 17.7. Electrobisturí. 18. Equipo mínimo para manejo de la vía aérea. 20. Sala de recuperación que cuenta con: camilla con barandas, carro de paro, bomba de infusión, monitor de signos vitales."],MD:["25. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con convenio o contrato vigente con un banco de sangre certificado para el suministro de componentes sanguíneos y la realización de pruebas transfusionales."],PP:["30. Cuenta con información documentada para: 30.1. Entrega de turno de enfermería y medicina. 30.2. Plan de cuidados de enfermería. 30.3. Control de líquidos. 30.4. Administración de medicamentos. 30.5. Sujeción de pacientes. 30.6. Toma de muestras de laboratorio. 30.7. Cateterismo vesical. 30.8. Evaluación y registro preanestésico. 30.9. Preparación del paciente para el acto quirúrgico. 30.10. Manejo de complicaciones postquirúrgicas. 30.11. Condiciones para el transporte del paciente. 30.12. Controles postquirúrgicos. 30.13. Formulación de sangre y componentes sanguíneos cuando se realice."],HC:["Cumple con los criterios que le sean aplicables de todos los servicios."],IN:["COMPLEJIDAD MEDIANA: 40.1. Servicio de hospitalización. 40.2. Servicio farmacéutico. 40.3. Servicio de imágenes diagnósticas. 40.4. Servicio de laboratorio clínico. 41. Disponibilidad de: 41.1. Servicio de patología. 41.2. Servicio de gestión pretransfusional. 41.3. Servicio de transporte asistencial.\n\nCOMPLEJIDAD ALTA: 42. Adicionalmente: Servicio de cuidado intensivo según oferta, servicio de gestión pretransfusional, servicio de patología cuando se oferte cirugía con alcance oncológica."]}},
"AD-02":{nombre:"Servicio Farmacéutico",grupo:"Apoyo Diagnóstico",criterios:{TH:["1. Cumple con los criterios definidos para todos los servicios y adicionalmente cumple con lo definido en el Decreto 2200 de 2005 compilado en el Decreto 780 de 2016 y la Resolución 1403 de 2007 (Manual de condiciones esenciales y procedimientos del servicio farmacéutico)."],IF:["Complejidad baja: 5. Cuenta con: 5.1. Ambiente o área administrativa. 5.2. Ambiente o área de recepción de medicamentos y dispositivos médicos. 5.3. Ambiente o área de dispensación de medicamentos y entrega de dispositivos médicos. 5.4. Ambiente o área de almacenamiento que garantice condiciones de temperatura y humedad. 5.5. Ambiente o área independiente de medicamentos de control especial cuando aplique. 5.6. Ambiente o área para almacenamiento de productos rechazados, devueltos y retirados. 5.7. Ambiente o área para almacenamiento de productos destruidos o desnaturalizados. 5.8. Ambiente o área de cuarentena de medicamentos."],DO:["9. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente: 9.1. La dotación y mobiliario exclusivos y necesarios para el cumplimiento de los objetivos del servicio de acuerdo con las recomendaciones del fabricante. 9.2. Instrumentos para medir humedad relativa y temperatura donde se almacenen medicamentos y dispositivos médicos."],MD:["Cumple con los criterios que le sean aplicables de todos los servicios."],PP:["15. Cumple con los criterios de todos los servicios y adicionalmente cuenta con información documentada de: 15.1. Procesos generales que realice. 15.2. Información visible al usuario que prohíba la asesoría farmacológica por parte de personal diferente al Químico Farmacéutico o al profesional de Medicina tratante. 15.3. Manejo de medicamentos de control especial. 15.4. Seguimiento a condiciones ambientales de temperatura y humedad."],HC:["Cumple con los criterios que le sean aplicables de todos los servicios."],IN:["No aplica."]}},
"AD-12":{nombre:"Laboratorio Clínico",grupo:"Apoyo Diagnóstico",criterios:{TH:["1. Cumple con los criterios de todos los servicios y adicionalmente: 1.1. Bacteriólogo(a). 1.2. Talento humano profesional con constancia de formación continua en actividades relacionadas con el laboratorio clínico. 1.3. Auxiliar(es) de laboratorio clínico o de enfermería, cuando se requiera. 2. Disponibilidad de bacteriólogo en zonas dispersas con permanencia según lo definido en el estándar de procesos prioritarios."],IF:["7. Cumple con los criterios de todos los servicios. 8. Cuenta con: 8.1. Área para recepción de muestras, información y entrega de resultados. 8.2. Ambiente(s) técnico(s) de procedimientos con: mesón de trabajo con poceta cuando se requiera, ducha manual o lavaojos, área para neveras o cuarto frío, lavamanos, ambiente oscuro cuando se requiera. 8.3. Área o ambiente para almacenamiento de materiales, insumos y reactivos. 9. Disponibilidad de: sala de espera, unidades sanitarias discriminadas por sexo."],DO:["12. Cumple con los criterios de todos los servicios y adicionalmente: 12.1. Equipos biomédicos manuales, semi-automatizados o automatizados para los procedimientos que realice. 12.2. Cabina de bioseguridad si procesa muestras para bacterias anaerobias, micosis o biología molecular. 12.3. Microscopio para toma e interpretación de pruebas para enfermedades transmitidas por vectores en zonas rurales y endémicas."],MD:["Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con medicamentos, dispositivos médicos e insumos requeridos para el procesamiento de las muestras."],PP:["16. Cuenta con información documentada de: 16.1. Programa de control de calidad interno y externo. 16.2. Validación secundaria o verificación. 16.3. Análisis de los reportes del control de calidad. 16.4. Toma, identificación, transporte, conservación, embalaje y remisión de las muestras. 16.5. Entrega de resultados. 16.6. Supervisión de la toma de muestras cuando sea realizada por los auxiliares. 16.7. Limpieza y desinfección del material. 16.8. Control de calidad de las pruebas POCT."],HC:["18. Cuenta con: registros de pacientes y exámenes, registros de validación, formato de reporte de resultados, registros de control de calidad, contrato o convenio con el o los laboratorios que realizan el procesamiento de las muestras."],IN:["No aplica."]}},

let S={vis:{},act:null,tab:"id",est:"TH"};
function ld(){try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);S.vis=d||{};}}catch(e){}}
function sv(){try{localStorage.setItem(SK,JSON.stringify(S.vis));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fmtD(x){if(!x)return"—";try{return new Date(x).toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"})}catch(e){return x}}
function V(){return S.act?S.vis[S.act]:null}
function upd(k,v){if(!S.act)return;S.vis[S.act]={...S.vis[S.act],[k]:v,mod:new Date().toISOString()};sv()}
function setN(campo,k,v){const vi=V();if(!vi)return;upd(campo,{...(vi[campo]||{}),[k]:v})}

function prog(v){
  let t=0,e=0,n=0;const ev=v.ev||{};
  EST.forEach(es=>{
    (T[es.id]||[]).forEach((_,i)=>{t++;const x=ev[`T_${es.id}_${i}`];if(x){e++;if(x==="NC")n++}});
    (v.svcs||[]).forEach(cod=>{
      ((SVC_DATA[cod]||{}).criterios||{})[es.id]||[]).forEach((_,i)=>{t++;const x=ev[`E_${cod}_${es.id}_${i}`];if(x){e++;if(x==="NC")n++}});
    });
  });
  return{t,e,n,p:t>0?Math.round(e/t*100):0}
}

function R(){document.getElementById("app").innerHTML=S.act?renderApp():renderInicio()}

function renderInicio(){
  const lista=Object.values(S.vis).sort((a,b)=>new Date(b.mod)-new Date(a.mod));

  <h1>Sistema de Lista de Verificación<br>de Habilitación en Salud</h1>

    <div><div class="hi-nom">${v.p?.nom||"Prestador sin nombre"}${v.cerrada?'<span class="hi-cerr">✓ Cerrada</span>':""}</div>

  const v=V();if(!v)return"";

  return`<div class="hdr">
    <div class="hdr-left">
      <button class="btn-back" onclick="S.act=null;R()">← Inicio</button>
      <div><div class="hdr-brand">Res.3100/2019 · ${(v.svcs||[]).length} servicio(s) · ${pg.p}%${v.cerrada?" · Cerrada":""}</div>

function renderLista(v){
  const ev=v.ev||{},obs=v.obs||{},asig=v.asig||{};
  const svcs=v.svcs||[];
  const esID=S.est;
  const esNom=EST.find(e=>e.id===esID)?.nombre||esID;
  const tr=T[esID]||[];
  const especificos=svcs.flatMap(cod=>{
    const crits=((SVC_DATA[cod]||{}).criterios||{})[esID]||[];
    return crits.map((c,i)=>({txt:c,idx:i,cod,nom:SVC_DATA[cod]?.nombre||cod}));
  });
  const tev=tr.filter((_,i)=>ev[`T_${esID}_${i}`]).length;
  const eev=especificos.filter(c=>ev[`E_${c.cod}_${esID}_${c.idx}`]).length;
  const tnc=tr.filter((_,i)=>ev[`T_${esID}_${i}`]==="NC").length;
  const enc=especificos.filter(c=>ev[`E_${c.cod}_${esID}_${c.idx}`]==="NC").length;
  const tot=tr.length+especificos.length;
  const pct=tot>0?Math.round((tev+eev)/tot*100):0;
  const miem=(v.eq?.miem||"").split("\n").map(m=>m.trim()).filter(Boolean);

  const crFila=(ke,kobs,txt,esEsp,nm)=>{
    const val=ev[ke]||"",ov=obs[kobs]||"",nc=val==="NC";
    return`<div class="cr${nc?" nc":""}">
      <div class="cr-top${esEsp?" e":" t"}${nc?" nc":""}">
        <div style="flex:1">
          <div class="cr-meta${esEsp?" e":" t"}">${esEsp?"Específico · "+nm:"Sección 11.1 · Todos los servicios"}</div>
          <div class="cr-body${nc?" nc":""}">${txt.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
        </div>
        <div class="cp">${CONV.map(c=>`<button class="${val===c?c:""}" onclick="setEv('${ke}','${c}')">${c}</button>`).join("")}</div>
      </div>
      ${(nc||ov)?`<div class="cr-obs${nc?" nc":""}">
        <label>${nc?"Detalle del incumplimiento — evidencia encontrada:":"Observaciones:"}</label>
        <textarea rows="${nc?3:2}" placeholder="${nc?"Criterio solicitado, evidencia observada...":"Observaciones generales..."}" oninput="setObs('${kobs}',this.value)">${ov.replace(/</g,"&lt;")}</textarea>
      </div>`:""}
    </div>`
  };

  const sidebar=EST.map(es=>{
    const ct=T[es.id]||[];
    const et=ct.filter((_,i)=>ev[`T_${es.id}_${i}`]).length;
    const nc=ct.filter((_,i)=>ev[`T_${es.id}_${i}`]==="NC").length+
             svcs.reduce((a,cod)=>a+((SVC_DATA[cod]?.criterios||{})[es.id]||[]).filter((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==="NC").length,0);
    const on=S.est===es.id;
    return`<button class="sb-btn${on?" on":""}" onclick="S.est='${es.id}';R()">
      <div class="sb-btn-nom">${es.nombre}</div>
      <div class="sb-btn-sub"><span>${et}/${ct.length}</span>${nc>0?`<span class="rnc">✕${nc}</span>`:""}</div>
    </button>`
  }).join("");

  return`<div class="lista-wrap">
    <div class="sidebar">
      <div class="sb-label">Estándares</div>
      ${sidebar}
    </div>
    <div class="lista-main">
      <div class="prog-row">
        <h2 style="font-size:16px;font-weight:700;color:#1a237e">${esNom}</h2>
        <div style="text-align:right">
          <div class="prog-pct">${pct}%</div>
          ${(tnc+enc)>0?`<div style="font-size:9px;color:#dc2626;font-weight:700">✕ ${tnc+enc} incumplimiento(s)</div>`:""}
        </div>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      ${miem.length>0?`<div class="asign">
        <label>Auditor asignado:</label>
        <select onchange="setAsig('${esID}',this.value)">
          <option value="">Sin asignar</option>
          ${miem.map(m=>`<option${asig[esID]===m?" selected":""}>${m}</option>`).join("")}
        </select>
      </div>`:""}
      <div class="blk-hdr t">
        <div>
          <div class="blk-lbl">Sección 11.1 · Aplica a TODOS los servicios</div>
          <div class="blk-cnt">Se evalúan primero · ${tev}/${tr.length} evaluados${tnc>0?` · <span style="color:#dc2626">${tnc} NC</span>`:""}</div>
        </div>
      </div>
      ${tr.map((c,i)=>crFila(`T_${esID}_${i}`,`T_${esID}_${i}_o`,c,false,"")).join("")}
      ${svcs.length>0?`
      <div class="blk-hdr e">
        <div>
          <div class="blk-lbl">Criterios específicos por servicio del prestador</div>
          <div class="blk-cnt">Adicionales a los transversales · ${eev}/${especificos.length} evaluados${enc>0?` · <span style="color:#dc2626">${enc} NC</span>`:""}</div>
        </div>
      </div>
      ${especificos.map(c=>crFila(`E_${c.cod}_${esID}_${c.idx}`,`E_${c.cod}_${esID}_${c.idx}_o`,c.txt,true,c.nom)).join("")}
      `:`<div class="sin-datos">Selecciona los servicios del prestador en la pestaña "Servicios".</div>`}
    </div>
  </div>`
}

function renderExp(v){
  const exp=v.exp||{};
  return`<div class="pg">
  <div class="warn-box">⚡ <strong>Lista Exprés</strong> — Evaluación rápida de puntos transversales amplios por estándar. No reemplaza la lista completa de la Res. 3100/2019.</div>
  ${EST.map(es=>`<div class="card" style="margin-bottom:12px">
    <div class="card-hd">${es.nombre}</div>
    <div class="card-bd">
    ${(EXPRESS[es.id]||[]).map((p,i)=>{
      const kv=`${es.id}_${i}`,ko=`${es.id}_${i}_o`,val=exp[kv]||"",ov=exp[ko]||"";
      return`<div class="exp-item">
        <div class="exp-row">
          <span class="exp-txt">${p}</span>
          <div class="cp">${CONV.map(c=>`<button class="${val===c?c:""}" onclick="setExp('${kv}','${c}')">${c}</button>`).join("")}</div>
        </div>
        ${(val==="NC"||ov)?`<textarea rows="2" style="width:100%;padding:6px 9px;border-radius:6px;border:1.5px solid #dde3ef;font-size:12px;resize:vertical" placeholder="Observación..." oninput="setExp('${ko}',this.value)">${ov.replace(/</g,"&lt;")}</textarea>`:""}`
      }).join("")}
    </div>
  </div>`).join("")}
  </div>`
}

function renderRes(v){
  const ev=v.ev||{},obs=v.obs||{};
  const svcs=v.svcs||[];
  const pg=prog(v);
  const p=v.p||{},eq=v.eq||{},sit=v.sit||{};

  const resEst=EST.map(es=>{
    const ct=T[es.id]||[];
    const ncT=ct.filter((_,i)=>ev[`T_${es.id}_${i}`]==="NC").length;
    const cumT=ct.filter((_,i)=>ev[`T_${es.id}_${i}`]==="C").length;
    const ncE=svcs.reduce((a,cod)=>a+((SVC_DATA[cod]?.criterios||{})[es.id]||[]).filter((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==="NC").length,0);
    const cumE=svcs.reduce((a,cod)=>a+((SVC_DATA[cod]?.criterios||{})[es.id]||[]).filter((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==="C").length,0);
    return{...es,ncT,cumT,ncE,cumE,nc:ncT+ncE,cum:cumT+cumE};
  });

  const incs=[];
  EST.forEach(es=>{
    (T[es.id]||[]).forEach((c,i)=>{if(ev[`T_${es.id}_${i}`]==="NC")incs.push({est:es.nombre,tipo:"11.1",svc:"—",txt:c,o:obs[`T_${es.id}_${i}_o`]||""})});
    svcs.forEach(cod=>{
      const nm=SVC_DATA[cod]?.nombre||cod;
      ((SVC_DATA[cod]?.criterios||{})[es.id]||[]).forEach((c,i)=>{if(ev[`E_${cod}_${es.id}_${i}`]==="NC")incs.push({est:es.nombre,tipo:"Específico",svc:nm,txt:c,o:obs[`E_${cod}_${es.id}_${i}_o`]||""})});
    });
  });
  const hayNC=incs.length>0;

  return`<div class="pg">
  <div class="kpis">
    ${[{l:"Evaluados",v:`${pg.e}/${pg.t}`,c:"#1a237e"},{l:"Completitud",v:pg.p+"%",c:pg.p===100?"#16a34a":"#1a237e"},{l:"Incumplimientos",v:pg.n,c:pg.n>0?"#dc2626":"#16a34a"},{l:"Servicios",v:svcs.length,c:"#0891b2"}].map(k=>`<div class="kpi"><div class="kpi-val" style="color:${k.c}">${k.v}</div><div class="kpi-lbl">${k.l}</div></div>`).join("")}
  </div>
  <div class="card" style="margin-bottom:14px"><div class="card-hd">Resultado por Estándar</div>
    <div style="overflow-x:auto"><table class="res-tbl">
      <thead><tr><th>Estándar</th><th>Criterios 11.1 (C/NC)</th><th>Específicos (C/NC)</th><th>Total NC</th><th>Resultado</th></tr></thead>
      <tbody>${resEst.map((es,i)=>`<tr style="background:${i%2?"#fff":"#fafbff"}">
        <td style="font-weight:500">${es.nombre}</td>
        <td>${es.cumT} C / ${es.ncT>0?`<span style="color:#dc2626">${es.ncT}</span>`:"0"} NC</td>
        <td>${es.cumE} C / ${es.ncE>0?`<span style="color:#dc2626">${es.ncE}</span>`:"0"} NC</td>
        <td>${es.nc>0?`<span style="color:#dc2626;font-weight:700">${es.nc}</span>`:"0"}</td>
        <td><span class="bdg ${es.nc>0?"nc":"c"}">${es.nc>0?"NO CUMPLE":"CUMPLE"}</span></td>
      </tr>`).join("")}</tbody>
    </table></div>
  </div>
  ${incs.length>0?`<div class="card" style="border-color:#fca5a5;margin-bottom:14px">
    <div class="card-hd" style="color:#991b1b;background:#fee2e2">Registro de Incumplimientos — ${incs.length} criterio(s)</div>
    ${incs.map((inc,i)=>`<div class="inc-item" style="${i===incs.length-1?"border:none":""}">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
        <span class="bdg nc">${inc.est}</span>
        <span style="font-size:10px;color:#64748b">${inc.tipo}</span>
        ${inc.svc!=="—"?`<span style="font-size:10px;color:#6366f1;font-weight:500">${inc.svc}</span>`:""}
      </div>
      <div style="font-size:12px;margin-bottom:3px">${inc.txt.replace(/</g,"&lt;").substring(0,200)}${inc.txt.length>200?"...":""}</div>
      <div style="font-size:11px;color:#dc2626"><strong>Evidencia:</strong> ${inc.o||"<em style='color:#94a3b8'>Sin detalle registrado</em>"}</div>
    </div>`).join("")}
  </div>`:""}
  <div class="resultado ${hayNC?"nc":"c"}">
    <div class="tit">${hayNC?"⚠ RESULTADO: NO CUMPLE":"✓ RESULTADO: CUMPLE"}</div>
    <div class="sub">${hayNC?`${incs.length} incumplimiento(s) evidenciado(s). El prestador debe corregir las condiciones señaladas.`:`El prestador cumple con las condiciones de habilitación para los ${svcs.length} servicio(s) verificados.`}</div>
  </div>
  <div class="btn-row">
    <button class="btn-dl" onclick="descargarActa()">⬇ Descargar Acta (.txt)</button>
    ${!v.cerrada?`<button class="btn-cl" onclick="cerrarV()">✓ Cerrar Visita</button>`:`<span style="background:#d1fae5;color:#166534;padding:10px 22px;border-radius:8px;font-weight:600;font-size:12px">✓ Visita cerrada · ${fmtD(v.fechaCierre)}</span>`}
  </div>
  </div>`
}

function nuevaV(){
  const id=uid();
  S.vis[id]={id,cerrada:false,creado:new Date().toISOString(),mod:new Date().toISOString(),p:{},eq:{},sit:{},svcs:[],ev:{},obs:{},asig:{},exp:{}};
  sv();S.act=id;S.tab="id";R();
}
function abrirV(id){S.act=id;S.tab="id";R()}
function toggleSvc(cod){
  const v=V(),svcs=v.svcs||[];
  upd("svcs",svcs.includes(cod)?svcs.filter(s=>s!==cod):[...svcs,cod]);R();
}
function setEv(k,c){
  const v=V(),ev=v.ev||{};
  upd("ev",{...ev,[k]:ev[k]===c?"":c});R();
}
function setObs(k,val){const v=V();upd("obs",{...(v.obs||{}),[k]:val})}
function setAsig(est,val){const v=V();upd("asig",{...(v.asig||{}),[est]:val})}
function setConv(campo,k,c){const v=V(),obj=v[campo]||{};upd(campo,{...obj,[k]:obj[k]===c?"":c});R()}
function setExp(k,val){
  const v=V(),exp=v.exp||{};
  if(CONV.includes(val)){upd("exp",{...exp,[k]:exp[k]===val?"":val});R();}
  else{upd("exp",{...exp,[k]:val});}
}
function cerrarV(){upd("cerrada",true);upd("fechaCierre",new Date().toISOString());R()}
function descargarActa(){
  const v=V();if(!v)return;
  const p=v.p||{},eq=v.eq||{},sit=v.sit||{},ev=v.ev||{},obs=v.obs||{};
  const svcs=v.svcs||[];const pg=prog(v);
  const sep="═".repeat(70),lin="─".repeat(70);
  let t=`${sep}\nACTA DE VISITA DE HABILITACIÓN EN SALUD\nResolución 3100 de 2019\n${sep}\n\n`;
  t+=`FECHA INICIAL: ${eq.fi||"___"}  FECHA FINAL: ${eq.ff||"___"}\nMOTIVO: ${eq.mot||"___"}\n\n`;
  t+=`${lin}\nEQUIPO AUDITOR\n${lin}\nLíder: ${eq.lider||"___"}\nMiembros:\n${(eq.miem||"").split("\n").filter(Boolean).map(m=>"  · "+m).join("\n")}\n\n`;
  t+=`${lin}\nPRESTADOR\n${lin}\nNombre: ${p.nom||"___"}\nCód.Habilitación: ${p.cod||"___"}  NIT: ${p.nit||"___"}\nClase: ${p.clase||"___"}\nDirección: ${p.dir||"___"}  Municipio: ${p.mun||"___"}\nTeléfono: ${p.tel||"___"}  Email: ${p.email||"___"}\nRepresentante Legal: ${p.repLegal||"___"}\nFuncionarios que reciben: ${p.func||"___"}\n\n`;
  t+=`${lin}\nSITUACIONES PARTICULARES\n${lin}\nDeclarados: ${sit.decl||0}  Verificados: ${sit.verif||0}  Sin verificar: ${sit.sinV||0}\n\n`;
  t+=`${lin}\nSEGUIMIENTO A RIESGOS\n${lin}\nFichas técnicas indicadores: ${sit.fichas||"___"}\nEvaluación y seguimiento riesgos: ${sit.evalR||"___"}\nSuficiencia patrimonial: ${sit.patrimonial||"___"}\nCapacidad técnico-administrativa: ${sit.tecnico||"___"}\n\n`;
  t+=`${lin}\nSERVICIOS VERIFICADOS (${svcs.length})\n${lin}\n${svcs.map(cod=>`  [${cod}] ${SVC_DATA[cod]?.nombre||cod}`).join("\n")}\n\n`;
  t+=`${sep}\nRESULTADO FINAL: ${pg.n>0?"NO CUMPLE":"CUMPLE"}  |  Criterios evaluados: ${pg.e}/${pg.t}  |  Incumplimientos: ${pg.n}\n${sep}\n\n`;
  t+=`${lin}\nRESULTADO POR ESTÁNDAR\n${lin}\n`;
  EST.forEach(es=>{
    const ct=T[es.id]||[];
    const ncT=ct.filter((_,i)=>ev[`T_${es.id}_${i}`]==="NC").length;
    const ncE=svcs.reduce((a,cod)=>a+((SVC_DATA[cod]?.criterios||{})[es.id]||[]).filter((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==="NC").length,0);
    t+=`${es.nombre.padEnd(35)}11.1: ${ncT} NC  Específicos: ${ncE} NC  → ${ncT+ncE>0?"NO CUMPLE":"CUMPLE"}\n`;
  });
  const incs=[];
  EST.forEach(es=>{
    (T[es.id]||[]).forEach((c,i)=>{if(ev[`T_${es.id}_${i}`]==="NC")incs.push({est:es.nombre,tipo:"11.1",svc:"—",txt:c,o:obs[`T_${es.id}_${i}_o`]||""})});
    svcs.forEach(cod=>{const nm=SVC_DATA[cod]?.nombre||cod;((SVC_DATA[cod]?.criterios||{})[es.id]||[]).forEach((c,i)=>{if(ev[`E_${cod}_${es.id}_${i}`]==="NC")incs.push({est:es.nombre,tipo:"Específico",svc:nm,txt:c,o:obs[`E_${cod}_${es.id}_${i}_o`]||""})})});
  });
  if(incs.length){
    t+=`\n${lin}\nREGISTRO DE INCUMPLIMIENTOS\n${lin}\n`;
    let ea="";
    incs.forEach(inc=>{
      if(inc.est!==ea){t+=`\n▶ ${inc.est.toUpperCase()}\n`;ea=inc.est}
      t+=`  [${inc.tipo}] ${inc.svc!=="—"?"Servicio: "+inc.svc+"  ":""}\n  Criterio: ${inc.txt.substring(0,150)}...\n  Evidencia: ${inc.o||"Sin detalle"}\n  Criterio solicitado: ___________________________\n\n`;
    });
  }
  t+=`\n${lin}\nOBSERVACIONES GENERALES DE LA COMISIÓN\n${lin}\n\n\n${lin}\nOBSERVACIONES DEL PRESTADOR\n${lin}\n\n\n${lin}\nFIRMAS\n${lin}\nPrestador: ___________________________  Firma: ___________________________\nComisión: ____________________________  Firma: ___________________________\n\n${sep}\nGenerado: ${new Date().toLocaleString("es-CO")}\n${sep}\n`;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([t],{type:"text/plain;charset=utf-8"}));
  a.download=`Acta_${(p.nom||"prestador").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
}

window.nuevaV=nuevaV;window.abrirV=abrirV;window.toggleSvc=toggleSvc;
window.setEv=setEv;window.setObs=setObs;window.setAsig=setAsig;
window.setConv=setConv;window.setExp=setExp;window.setN=setN;
window.cerrarV=cerrarV;window.descargarActa=descargarActa;

ld();R();
</script>
