uario a servicios de consulta externa, hospitalización u otros servicios de cualquier complejidad.", "36.17. Identificación de pacientes que por su condición clínica pueden ser tratados en su domicilio.", "36.18. Identificación de pacientes que por su condición clínica pueden ser derivados a servicios de consulta externa que cuenten con la estrategia de consulta prioritaria.", "36.19. Manejo de urgencias que incluya:", "36.19.1. Intoxicación aguda y síndrome de abstinencia a sustancias psicoactivas, según oferta.", "36.19.2. Agitación psicomotora, conducta suicida y agresión a terceros.", "36.19.3. Agudización de síntomas psiquiátricos e intervención en crisis", "36.20. Plan Hospitalario para emergencias.", "36.21. Información al paciente sobre recomendaciones al egreso, criterios de reingreso, controles y posibles complicaciones.", "36.22. Declaración de muerte encefálica, acorde con la complejidad del servicio.", "36.23. Atención en salud a víctimas de violencia sexual según normatividad vigente.", "36.24. Aislamiento de pacientes que por su condición clínica lo requieran.", "36.25. Documento que orienta la atención en salud de pacientes con problemas y trastornos en salud mental o consumo de sustancias psicoactivas.", "36.26. Si ofrece la estrategia de sala de rehidratación oral o la estrategia de sala ERA, cuenta con información documentada sobre el manejo de pacientes que requieran rehidratación oral y/o pacientes con enfermedad respiratoria alta y baja, que incluye:", "36.26.1. Criterios documentados sobre las condiciones de los pacientes que pueden ser manejados en el servicio.", "36.26.2. Seguimiento del estado clínico.", "36.26.3. Criterios de tiempos máximos de manejo de pacientes con rehidratación oral y de pacientes con enfermedad respiratoria alta y baja, así como de su remisión al servicio de hospitalización.", "36.26.4. Información al paciente sobre recomendaciones al egreso, criterios que impliquen reingreso al servicio, controles y posibles complicaciones.", "37. Cuando la sala de observación o el ambiente de transición del servicio de urgencias se preste en más de un piso o nivel en la misma edificación, cuenta con documento que indique el traslado de pacientes entre los diferentes pisos o niveles.", "Modalidad telemedicina - prestador de referencia", "38. Cumple con los criterios que le sean aplicables de todos los servicios."], "HC": ["Complejidades baja, mediana y alta", "Modalidades intramural y telemedicina: prestador remisor - prestador referencia", "39. Cumple con los criterios que le sean aplicables de todos los servicios."], "IN": ["Complejidad baja", "Modalidades intramural", "40. Cumple con los criterios definidos en todos los servicios y adicionalmente,", "41. Disponibilidad de:", "41.1. Servicio de imágenes diagnósticas, a excepción de las zonas especiales de dispersión geográfica, donde no se exigirá.", "41.2. Servicio de laboratorio clínico", "41.3. Servicio de hospitalización", "41.4. Servicio farmacéutico", "41.5. Servicio de transporte asistencial", "41.6. Servicios de apoyo (alimentación, lavandería, vigilancia)", "Modalidad telemedicina- prestador remisor - prestador referencia", "42. No aplica", "Complejidad mediana", "Modalidades intramural", "43. Cumple con los criterios definidos en todos los servicios y adicionalmente, cuenta con:", "43.1. Servicio de imágenes diagnósticas", "43.2. Servicio de laboratorio clínico", "43.3. Servicio de hospitalización", "43.4. Servicio de cirugía", "43.5. Servicio farmacéutico", "44. Disponibilidad de:", "44.1. Servicio de transporte asistencial", "44.2. Servicios de apoyo (alimentación, lavandería, vigilancia).", "Modalidad telemedicina- prestador remisor -prestador referencia", "45. No aplica", "Complejidad alta", "Modalidades intramural", "46. Cumple con los criterios definidos en todos los servicios y adicionalmente, cuenta con:", "46.1. Servicio de hospitalización", "46.2. Servicio de cirugía", "46.3. Servicio de cuidado intensivo adulto o pediátrico o neonatal, según oferta.", "46.4. Servicio farmacéutico", "46.5. Servicio de imágenes diagnósticas", "46.6. Servicio de laboratorio clínico", "46.7. Servicio de gestión pre transfusional", "47. Disponibilidad de:", "47.1. Servicio de transporte asistencial", "47.2. Servicios de apoyo (alimentación, lavandería, vigilancia).", "Modalidad telemedicina- prestador remisor- prestador referencia", "48. No aplica"]}}, "AI-02": {"nombre": "Transporte Asistencial", "grupo": "Atención Inmediata", "criterios": {"TH": ["Complejidad baja", "Modalidades extramural y telemedicina - prestador remisor", "Para ambulancias terrestres:", "1. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con:", "1.1. Tecnólogo en atención prehospitalaria o técnico profesional en atención prehospitalaria o auxiliar en enfermería,  en cualquier caso, cuenta con constancia de asistencia en las acciones de formación continua en soporte vital básico.", "1.2. Conductor que cuenta con licencia para la conducción del respectivo vehículo, expedida por la autoridad competente  y adicionalmente cuenta con constancia de asistencia en las acciones de formación continua en primeros auxilios o de primer respondiente.", "Para ambulancias fluviales y marítimas:", "2. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con:", "2.1. Tecnólogo en atención prehospitalaria o técnico profesional en atención prehospitalaria o auxiliar en enfermería, en cualquier caso, cuenta con constancia de asistencia en las acciones de formación continua en soporte vital básico.", "2.2. Para embarcaciones menores (cuya capacidad de transporte no excede las 25 toneladas) cuenta con:", "2.2.1. Motorista y tripulante (que puede ser ayudante fluvial), que cuentan con permiso expedido por la autoridad competente  y adicionalmente cuentan con constancia de asistencia en las acciones de formación continua en primeros auxilios o de primer respondiente.", "2.2.2. Para embarcaciones mayores (cuya capacidad de transporte excede las 25 toneladas) la tripulación mínima será la que determina el Ministerio de Transporte para las 6 categorías que conforman este grupo de embarcaciones, cuenta con licencia expedidos por la autoridad competente y adicionalmente cuentan con constancia de asistencia en las acciones de formación continua en primeros auxilios o de primer respondiente.", "Complejidad mediana", "Modalidades extramural y telemedicina - prestador remisor", "Para ambulancias terrestres, fluviales y marítimas", "3. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con:", "3.1. Coordinador responsable de la totalidad de las ambulancias con las que cuente el servicio, que puede ser profesional de la medicina o profesional de la enfermería.", "4. La ambulancia cuenta con la siguiente tripulación:", "4.1. Profesional de la medicina.", "4.2. Profesional de la enfermería o tecnólogo en atención prehospitalaria o técnico profesional en atención prehospitalaria o auxiliar de enfermería.", "4.3. Conductor que cuenta con licencia para la conducción del respectivo vehículo expedida por la autoridad competente y adicionalmente cuenta con constancia de asistencia en las acciones de formación continua en primeros auxilios o de primer respondiente.", "4.4. El personal profesional de la salud cuenta con constancia de asistencia en las acciones de formación continua en soporte vital avanzado.", "4.5. El personal técnico o auxiliar cuenta con constancia de asistencia en las acciones de formación continua en soporte vital básico.", "Para ambulancias fluviales y marítimas", "5. Para embarcaciones menores (cuya capacidad de transporte no excede las 25 toneladas), motorista y otro tripulante (que puede ser ayudante fluvial), con permisos expedidos por la autoridad competente y adicionalmente cuentan con constancia de asistencia en las acciones de formación continua en primeros auxilios o de primer respondiente.", "6. Para embarcaciones mayores (cuya capacidad de transporte excede las 25 toneladas), la tripulación mínima será la que determina el Ministerio de Transporte para las 6 categorías que conforman este grupo de embarcaciones, con licencias y permisos expedidos por la autoridad competente y adicionalmente cuentan con constancia de asistencia en las acciones de formación continua en primeros auxilios o de primer respondiente.", "Para ambulancias aéreas", "7. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con:", "7.1. Profesional de la medicina.", "7.2. Profesional de la enfermería o tecnólogo (a) en atención prehospitalaria o técnico (a) profesional en atención prehospitalaria.", "7.3. Tripulación de vuelo que cuenta con licencia y certificado médico expedido por la unidad administrativa especial de aeronáutica civil – UAEAC.", "7.4. El personal profesional de la salud cuenta con constancia de asistencia en las acciones de formación continua en soporte vital avanzado.", "7.5. El personal técnico o auxiliar cuenta con constancia de asistencia en las acciones de formación continua en soporte vital básico.", "7.6. La tripulación de vuelo y el personal de salud cuentan con certificado vigente de entrenamiento específico para el servicio de ambulancias aéreas otorgado por un centro de instrucción aeronáutico autorizado por la unidad administrativa especial de aeronáutica civil – UAEAC.", "Complejidades baja y mediana", "Modalidad de telemedicina - prestador de referencia", "8. Cumple con los criterios que le sean aplicables de todos los servicios.", "9. El profesional de la salud puede hacer uso de la categoría telexperticia sincrónica entre profesionales de la salud, de acuerdo con lo definido por el prestador de servicios de salud en el estándar de procesos prioritarios.", "10. El personal de salud no profesional puede hacer uso de la categoría telexperticia sincrónica con profesionales de la salud de acuerdo con lo definido por el prestador de servicios de salud en el estándar de procesos prioritarios."], "IF": ["Complejidad baja", "Modalidades extramural y telemedicina - prestador remisor", "11. Las ambulancias terrestres, fluviales, y marítimas, además de los requisitos exigidos por el sector salud, deben cumplir con los que para este tipo de servicios determinen las autoridades de tránsito terrestre, fluvial y marítimo.", "Para ambulancias terrestres, fluviales y marítimas", "12. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con:", "12.1. Sede donde se manejen los procesos administrativos que cuenta con:", "12.1.1.Ambiente para el manejo de medicamentos y dispositivos médicos e insumos.", "12.1.2. Área o ambiente para el almacenamiento de equipos biomédicos.", "12.1.3. Área o ambiente para realizar procesos de limpieza y desinfección, que cuenta con mesón de trabajo con poceta", "12.1.4. Sistema eléctrico que permita la conexión de los equipos biomédicos.", "12.1.5. Ambiente para el archivo de las historias clínicos y registros.", "12.2. Disponibilidad de área o ambiente para realizar el proceso de aseo, limpieza y desinfección de los vehículos. Cuando el prestador de servicios de salud contrate el proceso de aseo, limpieza y desinfección de los vehículos con un tercero, cuenta con un contrato, o convenio o acuerdo escrito entre las partes. Para este caso el tercero cuenta con los permisos correspondientes expedidos por la autoridad sanitaria y ambiental para tal fin.", "Para ambulancias terrestres", "Carrocería del vehículo", "13. La carrocería del vehículo cuenta con:", "13.1. Dos compartimentos, uno para el conductor y otro para el paciente con comunicación visual y auditiva entre sí.", "13.2. Acceso principal al compartimiento del paciente por la parte posterior que cuenta con una apertura útil de mínimo 1.10 metros altura y de 0.90 metros de ancho, con mecanismo que permite el bloqueo en posición de “abierta”, con un peldaño adherido a la carrocería con acabado antideslizante para facilitar el acceso al compartimiento del paciente. Sobre estas medidas se autorizan variaciones máximas del 10 %.", "13.3. En el compartimiento del paciente, el vehículo cuenta con ventanas con vidrio de seguridad, visibilidad únicamente de adentro hacia fuera y dispositivo de martillo o de otro tipo, para fracturarlas, en caso de necesidad.", "13.4. Las dimensiones interiores del compartimiento del paciente para ambulancias 4x4, 4x2 y tipo van son mínimo de 2.20m de longitud, 1.50m de ancho y 1.35 de alto.", "13.5. En todos los lados exteriores de la carrocería incluida el techo está la leyenda “ambulancia”, fabricada en material reflectivo. En el aviso de la parte anterior externa de la carrocería, la palabra “ambulancia”, tiene un largo mínimo del 90% del frente del vehículo y está escrita en sentido inverso.", "13.6. En los costados y en la parte posterior de la ambulancia, lleva el nombre o logotipo del prestador de servicios de salud a la cual pertenece, también lleva la sigla TAB o TAM y el nombre del municipio sede del prestador de servicios de salud.", "13.7. En los costados, puertas posteriores y en el techo de la ambulancia, deberá tener “estrella de la vida”, de color azul o verde reflectivo, o el emblema protector de la misión médica de conformidad con lo dispuesto en la Resolución 4481 de 2012 o las normas que la modifiquen, adicionen o sustituyan del Ministerio de Salud y la Protección Social.", "13.8. Los vehículos de transporte asistencial en baja o mediana complejidad que estén al servicio de la sociedad nacional de la cruz roja colombiana, comité internacional de la cruz roja y la federación internacional de sociedades de la cruz roja estarán exentos de cumplir el anterior requisito y su emblema será la cruz roja sobre fondo blanco. De igual manera, los medios de transporte sanitario que pertenecen a las fuerzas militares y de policía, conservarán sus colores correspondientes y se identificarán con el emblema de la cruz roja, pintado sobre un recuadro blanco.", "14. El vehículo cuenta con:", "14.1. Dispositivo de señalización óptica (barra de luces) en la parte delantera y por encima del vidrio parabrisas que puede ser de tipo rotatorio, intermitente o estroboscópico, visible como mínimo a 180º y de fácil observación con la luz del día.", "14.2. Dispositivo de señalización óptica, que puede ser de tipo rotatorio, intermitente o estroboscópico, visible como mínimo a 180º y de fácil observación a la luz del día, que se encuentra ubicado en la parte posterior de la carrocería del vehículo.", "14.3. Dos luces de delimitación: laterales, blancas fijas, distribuidas simétricamente en cada costado del vehículo.", "14.4. Dos luces de delimitación: laterales rojas intermitentes, distribuidas simétricamente en cada costado del vehículo.", "Interior del vehículo", "15. Cuenta con:", "15.1. Revestimientos interiores del compartimiento del paciente sin elementos afilados o cortantes, de material lavable, con acabados no rugosos y resistentes al deterioro por agentes desinfectantes.", "15.2. Piso antideslizante, su unión con las paredes es hermética y se encuentra adherido al vehículo.", "15.3. Silla del acompañante y silla del personal auxiliador, de material lavable que cuenta con cinturones de seguridad y protección para la cabeza y la espalda.", "15.4. Cinturones de seguridad adicionales para sostener una camilla adicional.", "15.5. Leyenda de “este es un espacio libre de humo de tabaco” u otro similar” y “use el cinturón de seguridad”, ubicada en el compartimiento del paciente.", "15.6. Gabinetes del compartimiento del paciente que son livianos, de material resistente, lisos, lavables, sin bordes agudos o filos cortantes y cuentan con puertas de material transparente, resistente, con anclajes seguros para evitar su apertura.", "15.7. Los gabinetes llevan el nombre correspondiente y colores de identificación para guardar los elementos de acuerdo con su especialidad, así: azul: sistema respiratorio; rojo: sistema circulatorio; amarillo: pediátrico; verde: quirúrgico y accesorios.", "15.8. Entrepaños de los gabinetes que cuentan con borde ligeramente elevado para evitar que los medicamentos y equipos biomédicos se caigan cuando el vehículo está en movimiento.", "15.9. Los gases del tubo de escape no ingresan al interior de la ambulancia.", "15.10. Cuenta con iluminación interior para toda el área de manejo del paciente.", "15.11. Lámpara desmontable que permita su utilización a distancia del vehículo.", "15.12. Barra pasamanos en el compartimiento del paciente, fijada al techo y resistente para sostener al personal asistencial cuando el vehículo esté en movimiento.", "15.13. Compartimiento aislado para los cilindros de oxígeno medicinal con manómetros visibles y regulables desde el interior del compartimiento del paciente", "Sistema sonoro y de comunicaciones", "16. Cuenta con:", "16.1. Sirena como sistema principal de alerta.", "16.2. Sistema de telecomunicaciones de doble vía, asignado exclusivamente a la ambulancia, que le permita establecer contacto con su central, base o red de coordinación.", "16.3. Sistema de georreferenciación y comunicación que permita el monitoreo y contacto con la entidad territorial en salud a través del CRUE.", "Otras condiciones generales de seguridad del vehículo", "17. Cuenta con:", "17.1. Extintor para fuegos ABC, con capacidad mínima de carga de 2.26 kg. Para cada uno de los compartimentos de la ambulancia (conductor y paciente).", "17.2. Chalecos reflectivos para la tripulación.", "Para ambulancias marítimas y fluviales", "Condiciones generales de la embarcación", "18. Cuenta con:", "18.1. El diseño y la construcción de la embarcación cumple con la normatividad vigente a la fecha de la construcción, expedidas por las autoridades competentes.", "18.2.Compartimiento para el paciente que tiene como mínimo las siguientes dimensiones: largo útil 2.20 metros, ancho útil 2.20 metros Compartimientos livianos, de material resistente, lisos, lavables, sin bordes agudos o filos cortantes, con puertas resistentes, abatibles o deslizantes, con anclajes seguros para evitar su apertura.", "20.4. Los gabinetes llevan el nombre correspondiente y colores de identificación para guardar los elementos, de acuerdo con su especialidad, así: azul: sistema respiratorio; rojo: sistema circulatorio; amarillo: pediátrico; verde: quirúrgico y accesorios.", "20.5. El paciente está ubicado de tal manera que los gases de los motores no le afecten", "Luces y otros elementos del vehículo", "21. Cuenta con:", "21.1. Iluminación interior para toda el área de manejo del paciente.", "21.2. Brújula y luces de navegación.", "21.3. Dispositivo de señalización óptica (barra de luces) que puede ser de tipo rotatorio, intermitente o estroboscópico, de fácil observación con la luz del día, ubicado sobre el techo-cubierta.", "21.4. Compartimiento aislado para los cilindros de oxígeno medicinal con manómetros visibles y regulables desde el interior del compartimiento del paciente.", "Sistema de comunicaciones", "22. Cumple con los criterios definidos en materia de comunicaciones para ambulancia terrestre y adicionalmente cuenta con:", "22.1. Sistema de perifoneo externo como mecanismo de alerta o de información.", "22.2. Sistema de georreferenciación y comunicación que permita el monitoreo y contacto con la secretaría de salud departamental o distrital, o la entidad que tenga a cargo dichas competencias. a través del CRUE.", "Complejidad mediana", "Modalidades extramural y telemedicina - prestador remisor", "23. Las ambulancias terrestres, fluviales, marítimas y aéreas, además de los requisitos exigidos por el sector salud, deben cumplir con los que para este tipo de servicios determinen las autoridades de tránsito terrestre, fluvial, marítimo y aéreo.", "Para ambulancias terrestres", "Carrocería del vehículo", "24. Adicional a lo definido para la complejidad baja, la carrocería del function calcProg(v){
  let t=0,e=0,n=0;
  const ev=v.ev||{};
  ['A','B','C','D'].forEach(s=>{
    const crits=s==='A'?COND_ADMIN.documentos:s==='B'?COND_ADMIN.cap_tec_admin:s==='C'?COND_ADMIN.sistema_contable:COND_ADMIN.suficiencia;
    crits.forEach((_,i)=>{t++;const x=ev[`CA_${s}_${i}`];if(x){e++;if(x==='NC')n++;}});
  });
  EST.forEach(es=>{
    (T[es.id]||[]).forEach((_,i)=>{t++;const x=ev[`T_${es.id}_${i}`];if(x){e++;if(x==='NC')n++;}});
    (v.svcs||[]).forEach(cod=>{
      (((SVC_DATA[cod]||{}).criterios||{})[es.id]||[]).forEach((_,i)=>{
        t++;const x=ev[`E_${cod}_${es.id}_${i}`];if(x){e++;if(x==='NC')n++;}
      });
    });
  });
  return{t,e,n,p:t>0?Math.round(e/t*100):0};
}

function buildSidebar(v,ev){

    const ec=crits.filter((_,i)=>ev[`CA_${s}_${i}`]).length;
    const nc=crits.filter((_,i)=>ev[`CA_${s}_${i}`]==='NC').length;
    const on=estId===`CA_${s}`;
    return`<button class="sbb${on?' on':''}" onclick="estId='CA_${s}';R()">
      <div class="sbb-n">${noms[s]}</div>

    const ct=T[es.id]||[];

}

function renderRes(v){
  const ev=v.ev||{},obs=v.obs||{},svcs=v.svcs||[];
  const p=v.p||{},eq=v.eq||{};
  const pg=calcProg(v);
  const rf=v.resultado||'';

  const resEst=EST.map(es=>{
    const ct=T[es.id]||[];
    const ncT=ct.filter((_,i)=>ev[`T_${es.id}_${i}`]==='NC').length;
    const ncE=svcs.reduce((a,c)=>a+(((SVC_DATA[c]?.criterios||{})[es.id]||[]).filter((_,i)=>ev[`E_${c}_${es.id}_${i}`]==='NC').length),0);
    return{...es,ncT,ncE,nc:ncT+ncE};
  });

  const incs=[];
  ['A','B','C','D'].forEach(s=>{
    const crits=s==='A'?COND_ADMIN.documentos:s==='B'?COND_ADMIN.cap_tec_admin:s==='C'?COND_ADMIN.sistema_contable:COND_ADMIN.suficiencia;
    const noms={A:'Docs. Revisados',B:'Cap. Téc-Admin.',C:'Sist. Contable',D:'Suf. Patrimonial'};
    crits.forEach((c,i)=>{if(ev[`CA_${s}_${i}`]==='NC')incs.push({sec:'admin',nom:noms[s],svc:'Cond. Adm. y Financieras',txt:c,o:obs[`CA_${s}_${i}_o`]||''});});
  });
  EST.forEach(es=>{
    (T[es.id]||[]).forEach((c,i)=>{if(ev[`T_${es.id}_${i}`]==='NC')incs.push({sec:es.id,nom:EST_NOM[es.id],svc:'Todos los servicios',txt:c,o:obs[`T_${es.id}_${i}_o`]||''});});
    svcs.forEach(cod=>{
      const nm=SVC_DATA[cod]?.nombre||cod;
      (((SVC_DATA[cod]?.criterios||{})[es.id]||[])).forEach((c,i)=>{if(ev[`E_${cod}_${es.id}_${i}`]==='NC')incs.push({sec:es.id,nom:EST_NOM[es.id],svc:nm,txt:c,o:obs[`E_${cod}_${es.id}_${i}_o`]||''});});
    });
  });
  const hayNC=incs.length>0;

  return`<div class="pg">
  <div class="kpis">
    ${[{l:'Verificados',v:`${pg.e}/${pg.t}`,c:'#2b6cb0'},{l:'Completitud',v:pg.p+'%',c:pg.p===100?'#22543d':'#2b6cb0'},{l:'Incumplimientos',v:pg.n,c:pg.n>0?'#e53e3e':'#22543d'},{l:'Servicios',v:svcs.length,c:'#553c9a'}].map(k=>`<div class="kpi"><div class="kv" style="color:${k.c}">${k.v}</div><div class="kl">${k.l}</div></div>`).join('')}
  </div>

  <div class="card" style="margin-bottom:12px"><div class="chd">Resultado por Estándar y Servicio (Capacidad Tecnológica y Científica)</div>
    <div style="overflow-x:auto">
    ${resEst.map((es,idx)=>`
    <div style="padding:10px 13px;${idx>0?'border-top:1px solid #e2e8f0':''}">
      <div style="font-size:11px;font-weight:700;color:#2d3748;margin-bottom:6px">${idx+1}. ${EST_NOM[es.id]}</div>
      <table class="tbl"><thead><tr><th>Código</th><th>Servicio</th><th class="c">C</th><th class="c">NC</th><th class="c">NA</th><th class="c">NV</th><th class="c">NP</th></tr></thead>
      <tbody>${svcs.map(cod=>{
        const nm=SVC_DATA[cod]?.nombre||cod;
        const ce=(SVC_DATA[cod]?.criterios||{})[es.id]||[];
        const ct=T[es.id]||[];
        const hasNC=ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NC')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='NC');
        const hasC=!hasNC&&(ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='C')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='C'));
        const hasNA=!hasNC&&!hasC&&(ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NA')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='NA'));
        const hasNV=!hasNC&&!hasC&&!hasNA;
        const hasNP=ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NP');
        return`<tr><td style="font-family:monospace;font-size:10px">${cod}</td><td style="font-weight:500">${nm}</td>
          <td class="c" style="color:#22543d;font-weight:700">${hasC?'X':''}</td>
          <td class="c" style="color:#e53e3e;font-weight:700">${hasNC?'X':''}</td>
          <td class="c">${hasNA?'X':''}</td><td class="c">${hasNV?'X':''}</td><td class="c">${hasNP?'X':''}</td>
        </tr>`;
      }).join('')}</tbody></table>
    </div>`).join('')}
    </div>
  </div>

  ${incs.length>0?`<div class="card" style="border-color:#fc8181;margin-bottom:12px">
    <div class="chd" style="background:#fff5f5;color:#742a2a">Registro de Incumplimientos — ${incs.length} criterio(s)</div>
    ${incs.map((inc,i)=>`<div class="inc-row" style="${i===incs.length-1?'border:none':''}">
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px">
        <span class="bdg nc">${inc.nom}</span>
        <span style="font-size:10px;color:#718096">${inc.svc}</span>
      </div>
      <div style="font-size:11px;margin-bottom:3px">${inc.txt.replace(/</g,'&lt;').substring(0,220)}${inc.txt.length>220?'...':''}</div>
      <div style="font-size:11px;color:#e53e3e"><strong>Evidencia:</strong> ${inc.o||'<em style="color:#a0aec0">Sin detalle — registrar en la lista de verificación</em>'}</div>
    </div>`).join('')}
  </div>`:''}

  <div class="card" style="margin-bottom:12px"><div class="chd">Resultado de la Visita para el Prestador</div><div class="cbd">
    <div style="font-size:12px;color:#4a5568;margin-bottom:8px">Seleccione el resultado:</div>
    <div style="margin-bottom:10px">
      ${[{v:'CERTIFICA',l:'✓ CERTIFICA / CUMPLE'},{v:'CIERRE',l:'✗ CIERRE TEMPORAL O SUSPENSIÓN'},{v:'INV',l:'⚠ INVESTIGACIÓN ADMINISTRATIVA'}].map(r=>`<button class="rf-btn${rf===r.v?' activo':''}" onclick="setResultado('${r.v}')">${r.l}</button>`).join('')}
    </div>
    <label class="fl">Observaciones generales de la comisión verificadora</label>
    <textarea rows="3" class="fi" style="margin-top:3px" oninput="setN('obs_gen','val',this.value)" placeholder="Observaciones generales...">${v.obs_gen?.val||''}</textarea>
  </div></div>

  <div class="res-box ${hayNC?'nc':'c'}">
    <div style="font-size:20px;font-weight:700;color:${hayNC?'#742a2a':'#22543d'}">${hayNC?'⚠ RESULTADO: NO CUMPLE':'✓ RESULTADO: CUMPLE'}</div>
    <div style="font-size:12px;margin-top:5px;color:${hayNC?'#e53e3e':'#2f855a'}">${hayNC?`${incs.length} incumplimiento(s) evidenciado(s).`:`El prestador cumple con las condiciones de habilitación para los ${svcs.length} servicio(s) verificados.`}</div>
  </div>

  <div class="btn-row">
    <button class="btn-dl" onclick="descargarActa()">⬇ Descargar Acta (.txt)</button>
    <button class="btn-inf" onclick="descargarInforme()">⬇ Descargar Informe (.txt)</button>
    ${!v.cerrada?`<button class="btn-cerr" onclick="cerrarV()">✓ Cerrar Visita</button>`:`<span style="background:#c6f6d5;color:#22543d;padding:10px 20px;border-radius:7px;font-weight:600;font-size:12px">✓ Visita cerrada · ${fmtD(v.fechaCierre)}</span>`}
  </div>
  </div>`;
}

function nuevaV(){const id=uid();vis[id]={id,cerrada:false,creado:new Date().toISOString(),mod:new Date().toISOString(),p:{},eq:{},sit:{},svcs:[],ev:{},obs:{},asig:{},obs_gen:{}};sv();actId=id;tab='id';R();}
function abrirV(id){actId=id;tab='id';R();}
function toggleSvc(cod){const v=V(),svcs=v.svcs||[];upd('svcs',svcs.includes(cod)?svcs.filter(s=>s!==cod):[...svcs,cod]);R();}
function setEv(k,c){const v=V(),ev=v.ev||{};upd('ev',{...ev,[k]:ev[k]===c?'':c});R();}
function setObs(k,val){const v=V();upd('obs',{...(v.obs||{}),[k]:val});}
function setAsig(est,val){const v=V();upd('asig',{...(v.asig||{}),[est]:val});}
function setResultado(r){const v=V();upd('resultado',v.resultado===r?'':r);R();}
function cerrarV(){upd('cerrada',true);upd('fechaCierre',new Date().toISOString());R();}

function txtActa(){
  const v=V();if(!v)return'';
  const p=v.p||{},eq=v.eq||{},sit=v.sit||{},ev=v.ev||{},obs=v.obs||{},svcs=v.svcs||[];
  const rf=v.resultado||'';
  const sep='═'.repeat(70),lin='─'.repeat(70);
  let t=`ACTA DE VISITA DE CERTIFICACIÓN PARA VERIFICAR LAS\nCONDICIONES DE HABILITACIÓN EN SALUD\nNo. de Acta: ${eq.nro||'___'}\n${sep}\n\n`;
  t+=`FECHA INICIAL VISITA: ${eq.fi||'___'}   FECHA FINAL VISITA: ${eq.ff||'___'}\n\n`;
  t+=`Coordinador de la Visita de verificación: ${eq.lider||'___'}\n`;
  t+=`Miembros de la comisión verificadora:\n${(eq.miem||'').split('\n').filter(Boolean).map(m=>'  '+m).join('\n')}\n\n`;
  t+=`${lin}\nIDENTIFICACIÓN DEL PRESTADOR\n${lin}\n`;
  t+=`Prestador: ${p.nom||'___'}\nCódigo habilitación: ${p.cod||'___'}   NIT/CC: ${p.nit||'___'}\n`;
  t+=`Clase: ${p.clase||'___'}   Dirección: ${p.dir||'___'}   Municipio: ${p.mun||'___'}\n`;
  t+=`Código sede: ${p.codSede||'___'}   Teléfono: ${p.tel||'___'}\n`;
  t+=`Correo: ${p.email||'___'}   Representante Legal: ${p.repLegal||'___'}\n`;
  t+=`Funcionarios que reciben:\n${(p.func||'').split('\n').filter(Boolean).map(m=>'  '+m).join('\n')}\n\n`;
  t+=`Motivo: ${eq.mot||'___'}\n`;
  t+=`Servicios declarados: ${sit.decl||0}   Verificados: ${sit.verif||0}   Sin verificar: ${sit.sinV||0}   Sin declarar: ${sit.sinD||0}\n\n`;
  t+=`CONVENCIONES: C=CUMPLE  NC=NO CUMPLE  NA=NO APLICA  NV=NO VERIFICADO  NP=NO PRESTADO\n\n`;
  t+=`${sep}\n1. VERIFICACIÓN DE LAS CONDICIONES TÉCNICO-ADMINISTRATIVAS Y DE SUFICIENCIA PATRIMONIAL Y FINANCIERA\n${sep}\n`;
  const cfSecs=[{nom:'I. DOCUMENTOS REVISADOS',sec:'A'},{nom:'CONDICIONES DE CAPACIDAD TÉCNICO ADMINISTRATIVA',sec:'B'},{nom:'SISTEMA CONTABLE',sec:'C'},{nom:'CONDICIONES DE SUFICIENCIA PATRIMONIAL Y FINANCIERA',sec:'D'}];
  cfSecs.forEach(({nom,sec})=>{
    const crits=sec==='A'?COND_ADMIN.documentos:sec==='B'?COND_ADMIN.cap_tec_admin:sec==='C'?COND_ADMIN.sistema_contable:COND_ADMIN.suficiencia;
    t+=`\n${nom}\n${lin}\n`;
    crits.forEach((c,i)=>{
      const val=ev[`CA_${sec}_${i}`]||'';
      t+=`${c.substring(0,56).padEnd(58)} ${val==='C'?'X':'   '}  ${val==='NC'?'X':'   '}  ${val==='NA'?'X':'   '}  ${val==='NV'?'X':'   '}\n`;
    });
  });
  t+=`\n${sep}\n2. VERIFICACIÓN DE LAS CONDICIONES DE CAPACIDAD TECNOLÓGICA Y CIENTÍFICA\n${sep}\n`;
  EST.forEach((es,idx)=>{
    t+=`\n${idx+1}. ${EST_NOM[es.id]}\n`;
    t+=`${'CÓDIGO'.padEnd(12)} ${'SERVICIO'.padEnd(40)} C    NC   NA   NV   NP\n${lin}\n`;
    svcs.forEach(cod=>{
      const nm=(SVC_DATA[cod]?.nombre||cod).substring(0,38);
      const ce=(SVC_DATA[cod]?.criterios||{})[es.id]||[];
      const ct=T[es.id]||[];
      const hasNC=ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NC')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='NC');
      const hasC=!hasNC&&(ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='C')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='C'));
      const hasNA=!hasNC&&!hasC;
      const hasNP=ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NP');
      t+=`${cod.padEnd(12)} ${nm.padEnd(40)} ${hasC?'X':'   '}  ${hasNC?'X':'   '}  ${hasNA?'X':'   '}     ${hasNP?'X':'   '}\n`;
    });
  });
  t+=`\n${lin}\nTABLA DE ANEXOS\n${lin}\n${'N°'.padEnd(5)} ${'Descripción'.padEnd(45)} Digital   Papel\n`;
  t+='1'.padEnd(5)+' '.repeat(46)+'\n';
  t+='2'.padEnd(5)+' '.repeat(46)+'\n';
  t+='3'.padEnd(5)+' '.repeat(46)+'\n';
  t+=`\n${lin}\nOBSERVACIONES GENERALES DE LA COMISIÓN VERIFICADORA\n${lin}\n${v.obs_gen?.val||'_'.repeat(80)}\n\n`;
  t+=`${sep}\nRESULTADO DE LA VISITA PARA EL PRESTADOR\n${sep}\n`;
  t+=`CERTIFICA: ${rf==='CERTIFICA'?'X':' '}   CIERRE TEMPORAL/SUSPENSIÓN: ${rf==='CIERRE'?'X':' '}   INVESTIGACIÓN ADMINISTRATIVA: ${rf==='INV'?'X':' '}\n\n`;
  t+=`${lin}\nFIRMAS POR PARTE DEL PRESTADOR\n${lin}\n${'NOMBRE'.padEnd(35)} CARGO${' '.repeat(20)} FIRMA\n${lin}\n`;
  (p.func||'').split('\n').filter(Boolean).forEach(f=>{t+=`${f.substring(0,33).padEnd(35)} ${' '.repeat(25)}\n`;});
  t+=`\n${lin}\nFIRMAS POR LA COMISIÓN VERIFICADORA\n${lin}\n${'NOMBRE'.padEnd(35)} CARGO${' '.repeat(20)} FIRMA\n${lin}\n`;
  (eq.miem||'').split('\n').filter(Boolean).forEach(f=>{t+=`${f.substring(0,33).padEnd(35)} ${' '.repeat(25)}\n`;});
  t+=`\nGenerado: ${new Date().toLocaleString('es-CO')}\n`;
  return t;
}

function txtInforme(){
  const v=V();if(!v)return'';
  const p=v.p||{},eq=v.eq||{},sit=v.sit||{},ev=v.ev||{},obs=v.obs||{},svcs=v.svcs||[];
  const rf=v.resultado||'';
  const sep='═'.repeat(70),lin='─'.repeat(70);
  let t=`INFORME DE VISITA DE VERIFICACIÓN DE CONDICIONES DE HABILITACIÓN\nNo. de Informe: ${eq.nro||'___'}\n${sep}\n\n`;
  t+=`Fecha visita: ${eq.fi||'___'} al ${eq.ff||'___'}   Motivo: ${eq.mot||'___'}\n`;
  t+=`Coordinador: ${eq.lider||'___'}\nComisión:\n${(eq.miem||'').split('\n').filter(Boolean).map(m=>'  '+m).join('\n')}\n\n`;
  t+=`Prestador: ${p.nom||'___'}   NIT/CC: ${p.nit||'___'}   Código: ${p.cod||'___'}\n`;
  t+=`Clase: ${p.clase||'___'}   Municipio: ${p.mun||'___'}\n\n`;
  t+=`${sep}\nRESULTADO DE LAS CONDICIONES TÉCNICO-ADMINISTRATIVAS Y SUFICIENCIA PATRIMONIAL Y FINANCIERA\n${sep}\n`;
  const cfSecs=[{nom:'I. DOCUMENTOS REVISADOS',sec:'A'},{nom:'CONDICIONES DE CAPACIDAD TÉCNICO ADMINISTRATIVA',sec:'B'},{nom:'SISTEMA CONTABLE',sec:'C'},{nom:'CONDICIONES DE SUFICIENCIA PATRIMONIAL Y FINANCIERA',sec:'D'}];
  cfSecs.forEach(({nom,sec})=>{
    const crits=sec==='A'?COND_ADMIN.documentos:sec==='B'?COND_ADMIN.cap_tec_admin:sec==='C'?COND_ADMIN.sistema_contable:COND_ADMIN.suficiencia;
    t+=`\n${nom}\n`;
    crits.forEach((c,i)=>{const val=ev[`CA_${sec}_${i}`]||'';if(val)t+=`  [${val}] ${c.substring(0,100)}\n`;});
    const incSec=crits.map((c,i)=>({txt:c,val:ev[`CA_${sec}_${i}`]||'',o:obs[`CA_${sec}_${i}_o`]||''})).filter(x=>x.val==='NC');
    if(incSec.length>0){
      t+=`\nINCUMPLIMIENTOS:\n`;
      incSec.forEach(x=>{t+=`  CRITERIO: ${x.txt.substring(0,120)}\n  EVIDENCIA: ${x.o||'(Sin detalle)'}\n\n`;});
    }
  });
  t+=`\n${sep}\nRESULTADO DE LA CAPACIDAD TECNOLÓGICA Y CIENTÍFICA\n${sep}\n`;
  EST.forEach((es,idx)=>{
    t+=`\n${idx+1}. ${EST_NOM[es.id]}\n${lin}\n`;
    svcs.forEach(cod=>{
      const nm=SVC_DATA[cod]?.nombre||cod;
      const ce=(SVC_DATA[cod]?.criterios||{})[es.id]||[];
      const ct=T[es.id]||[];
      const hasNC=ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NC')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='NC');
      const hasC=!hasNC&&(ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='C')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='C'));
      t+=`  [${hasNC?'NC':hasC?'C':'NV'}] ${cod} - ${nm}\n`;
    });
    const incEst=[];
    (T[es.id]||[]).forEach((c,i)=>{if(ev[`T_${es.id}_${i}`]==='NC')incEst.push({svc:'Todos los servicios',txt:c,o:obs[`T_${es.id}_${i}_o`]||''});});
    svcs.forEach(cod=>{
      const nm=SVC_DATA[cod]?.nombre||cod;
      (((SVC_DATA[cod]?.criterios||{})[es.id]||[])).forEach((c,i)=>{if(ev[`E_${cod}_${es.id}_${i}`]==='NC')incEst.push({svc:nm,txt:c,o:obs[`E_${cod}_${es.id}_${i}_o`]||''});});
    });
    if(incEst.length>0){
      t+=`\nREGISTRO DE INCUMPLIMIENTOS EN ${EST_NOM[es.id]}:\n`;
      let lastSvc='';
      incEst.forEach(inc=>{
        if(inc.svc!==lastSvc){t+=`\n  SERVICIO: ${inc.svc.toUpperCase()}\n`;lastSvc=inc.svc;}
        t+=`  CRITERIO: ${inc.txt.substring(0,150)}...\n  EVIDENCIA: ${inc.o||'(Sin detalle)'}\n  CRITERIO SOLICITADO: ${' '.repeat(40)}\n\n`;
      });
    }
  });
  t+=`\n${sep}\nRESUMEN CONSOLIDADO POR SERVICIO\n${sep}\n`;
  t+=`${'CÓDIGO'.padEnd(10)} ${'SERVICIO'.padEnd(35)} TH  IF  DO  MD  PP  HC  IN  RESULTADO\n${lin}\n`;
  svcs.forEach(cod=>{
    const nm=SVC_DATA[cod]?.nombre||cod;
    let row=`${cod.padEnd(10)} ${nm.substring(0,33).padEnd(35)} `;
    let hayNC=false;
    EST.forEach(es=>{
      const ce=(SVC_DATA[cod]?.criterios||{})[es.id]||[];
      const ct=T[es.id]||[];
      const nc=ce.some((_,i)=>ev[`E_${cod}_${es.id}_${i}`]==='NC')||ct.some((_,i)=>ev[`T_${es.id}_${i}`]==='NC');
      if(nc)hayNC=true;
      row+=`${nc?'NC ':'C  '} `;
    });
    t+=row+`${hayNC?'NO CUMPLE':'CUMPLE'}\n`;
  });
  t+=`\n${lin}\nOBSERVACIONES GENERALES\n${lin}\n${v.obs_gen?.val||'_'.repeat(80)}\n\n`;
  t+=`${sep}\nRESULTADO: ${rf==='CERTIFICA'?'CERTIFICA':rf==='CIERRE'?'CIERRE TEMPORAL/SUSPENSIÓN':rf==='INV'?'INVESTIGACIÓN ADMINISTRATIVA':'___'}\n${sep}\n`;
  t+=`\n${lin}\nFIRMAS COMISIÓN VERIFICADORA\n${lin}\n${'NOMBRE'.padEnd(35)} CARGO${' '.repeat(15)} FIRMA\n${lin}\n`;
  (eq.miem||'').split('\n').filter(Boolean).forEach(f=>{t+=`${f.substring(0,33).padEnd(35)} ${' '.repeat(20)}\n`;});
  t+=`\nGenerado: ${new Date().toLocaleString('es-CO')}\n`;
  return t;
}

function descargarActa(){
  const v=V(),p=v?.p||{},eq=v?.eq||{};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txtActa()],{type:'text/plain;charset=utf-8'}));
  a.download=`Acta_${eq.nro||'XXX'}_${(p.nom||'prestador').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
}

function descargarInforme(){
  const v=V(),p=v?.p||{},eq=v?.eq||{};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txtInforme()],{type:'text/plain;charset=utf-8'}));
  a.download=`Informe_${eq.nro||'XXX'}_${(p.nom||'prestador').replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();URL.revokeObjectURL(a.href);
}

window.nuevaV=nuevaV;window.abrirV=abrirV;window.toggleSvc=toggleSvc;
window.setEv=setEv;window.setObs=setObs;window.setAsig=setAsig;
window.setN=setN;window.setResultado=setResultado;
window.cerrarV=cerrarV;window.descargarActa=descargarActa;window.descargarInforme=descargarInforme;

ld();R();

</script>
