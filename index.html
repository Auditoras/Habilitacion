<script>
const NORMA={"estandares": [{"id": "TH", "nombre": "Talento Humano"}, {"id": "IF", "nombre": "Infraestructura"}, {"id": "DO", "nombre": "Dotación"}, {"id": "MD", "nombre": "Medicamentos, DM e Insumos"}, {"id": "PP", "nombre": "Procesos Prioritarios"}, {"id": "HC", "nombre": "Historia Clínica y Registros"}, {"id": "IN", "nombre": "Interdependencia"}], "transversales": {"TH": ["1. El talento humano en salud y otros profesionales que se relacionan con la atención o resultados en salud de los usuarios, cuentan con los titulos, según aplique, de educación superior o certificados de aptitud ocupacional, expedidos por la entidad educativa competente. En el caso de títulos o certificados obtenidos en el extranjero, copia de la resolución de convalidación expedida por el Ministerio de Educación Nacional", "2. El talento humano en salud cuenta con copia de la resolución de autorización del ejercicio expedido por la autoridad competente  o inscripción e en el ReTHUS", "3. El prestador de servicios de salud determina la cantidad necesaria de talento humano requerido para cada uno de los servicios ofertados y prestados, de acuerdo con la capacidad instalada, la relación entre la oferta y demanda, la oportunidad en la prestación, tiempo de la atención y el riesgo en la atención. Este criterio no aplica para profesionales independientes de salud", "4. El prestador de servicios de salud que actúe como escenario de práctica formativa en el área de la salud, cuenta con:", "4.1. Convenio vigente con la institución educativa autorizada por la entidad competente", "4.2. Información documentada de los mecanismos de supervisión permanente del personal en entrnamiento", "4.3. Estudio de la capacidad instalada en el cual se dtermine el número máximo de estudiantes que simultaneamente puedan acceder por programa de formación y por jornada, para cada uno de los servicios que se utilicen como escenarios de práctica formativa en el área de la salud, estudio que debe ser elaborado teniendo en cuenta los \"lineamientos de referencia para la asignación de cupos de estudiantes en escenarios clinicos\" publicados por el Ministerio de Salud y Protección Social", "5. En los servicios de salud diferentes a los servicios de consulta externa especializada de dolor y cuidado paliativo, donde se atienden pacientes con enfermedades terminales, crónicas, degenerativas e irreversibles, a los cuales se les decida como conducta médica: como parte del plan integral de cuidado que gestiona el equipo de salud, o por solicitud del paciente; el manejo de dolor y cuidado paliativo, el profesional en medicina tratante cuenta con constancia de asistencia en las acciones de formación continua en el manejo de dolor y cuidado paliativo, cuando no sea especialista en dolor y cuidado paliativo", "6. El talento humano en salud de los servicios de atención del parto, cuidado intensivo y cuidado intermedio neonatal, pediátrico y adultos, cuentan con constancia de asistencia en las acciones de formación continua para la gestión del duelo", "7. En los servicios de salud donde se realicen imagenes diagnósticas por ultrasonido, cuenta con médico especialista en radiologia e imagenes diagnósticas también podrán realizar imagenes diagnósticas aquellos médicos especialistas, quienes en su pensum o formación académica hayan adquirido los conocimientos del manejo e interpretación del espectro electromagnetico, del ultrasonido especialmente, así como de la radiaciones ionizantes para establecer el diagnóstico o el tratamiento de las enfermedades inherentes a su especialidad, para lo cual deberá acreditar el respectivo certificado.", "8. Los profesionales de la medicina de los servicios de hospitalización de baja, mediana y alta complejidad, hospitalización paciente crónico con y sin ventilador, cuidados intensivos neonatales, pediátricos y adultos; urgencias, y servicios del grupo quirurgico en modalidad intramural,cuentan con certificación vigente de aprobación de la evaluación de competencias esenciales para el cuidado de la donante expedida por el Instituto Nacional de Salud.", "9. Las instituciones prestadoras de servicios de salud con servicios de cuidado intensivo pediatrico y adulto que adicionalmente habiliten servicio quirurgico de neurocirugía, tienen disponibilidad de coordinador operativo de trasplantes.", "10. El talento humano en salud de los servicios de salud de los grupos de consulta externa, internación y el servicio de urgencias, cuentan con constancia de asistencia en las acciones de formación continua en la atención integral en salud de las personas victimas de violencia sexual.", "11. El talento humano en salud de los servicios de transporte asistencial, atención prehospitalaria y urgencias, cuentasn con constancia de asistencia en las acciones de formación continua en la atención a personas víctimas de ataques con agentes químicos.", "12. Cuando en un servicio de salud se realicen \"pruebas en punto de atención del paciente - (point of care testing - POCT)\", el talento humano en salud qeu las realice, a excepción del profesional en bacteriologia cuenta con constancia de asistencia en las acciones de formación continua en la atención a personas víctimas de ataques con agentes químicos.", "13. Procedimientos bajo sedación:", "13.1 Cuando fuera de salas de cirugía, se realicen procedimientos bajo sedación Grado I y II, adicional al profesional de salud que realiza el procedimiento, cuenta con:", "13.1.1. Profesional en la medicina especialista en anestesiologia, o profesional de la medicina o profesional en odontologia, según aplique, el cual será el encargado de administrar el medicamento y realizar el monitoreo continuo del paciente (registro de signos vitales y la respuesta a la sedación)", "13.1.2. Todos los profesionales, a excepción del profesional de la medicina especialista en anestesiologia, deben demostrar constancia de asistencia a curso de formación continua en soporte vital básico y sedación", "13.1.3 Para sedacción con óxido nitroso en odontologia, el profesional de la odontología cuenta con constancia de asistencia en las acciones de formación continua para uso clínico y práctico de este gas.", "13.2. Cuando fuera de las salas de cirugia, se realicen procedimientos bajo sedación grado III, adicional al profesional de salud que realiza el procedimiento, cuenta con profesional de la medicina con especialidad médico - quirúrgica, quién será el responsable de administrar la sedación", "13.3. Cuando fuera de las salas de cirugía, se realicen procedimientos bajo sedación grado IV, adicional al profesional de  salud que realiza el procedimiento, cuenta con profesional de la medicina especialisa en anestesiologia, quién será el responsable de administrar la sedación", "13.4 Cuenta con profesional de la medicina especialista en anestesiologia cuando la atención de trate de pacientes con caracteristicas particulares: poco colaboradores; edades extremas; con enfermedades severas:cardíacas, pulmonares, hepáticas, renales o del sistema nervioso central;cualquier alteración del grado de consciencia, con obesidad mórbida, con apnea del sueño, embarazadas, o quienes abusan del alcohol o de las drogas; antecedentes de sedación fallida o que presentaron efectos adversos a algún medicamento utilizado en la sedación, por tener un elevado riesgo de desarrollar complicaciones relacionadas con la sedación analgesia", "Modalidad de telemedicina prestador remisor - prestador de referencia", "14. Adicional a los criterios del estándar de talento humano enunciados que le aplique, el talento humano en salud que preste directamente un servicio de salud bajo la modalidad telemedicina cuentan con constancia de asistencia en las acciones de formación continua en el manejo de tecnología utilizada por el prestador, los procesos y herramientas inherentes a la prestación de servicios bajo esta modalidad"], "IF": ["Edificaciones de uso exclusivo en salud", "1. Los servicios de salud de urgencias, de atención del parto, hospitalarios y de cirugía que realicen procedimientos quirúrgicos no ambulatorios, solo se pueden prestar en edificaciones de uso exclusivo de salud.", "2. Los servicios de salud de: urgencias, cirugía y del grupo de internación, así como en los servicios de salud donde se realice el proceso de esterilización, deben contar con ambiente de aseo de uso exclusivo", "3. Cuando en una edificación de uso exclusivo de salud funcione más de un prestador de servicios de salud con servicios de los grupos de consulta externa y apoyo diagnóstico y complementación terapeutica, cada prestador cuenta con infraestructura separada delimitada fisicamente. Se pueden compartir los siguientes ambientes y áreas: aseo, salas de espera y unidades sanitarias.", "4. Las edificaciones donde se presten servicios de salud de urgencias y del grupo de internación, cuentan con tanque de almacenamientode agua para el consumo humano que garantice como mínimo una reserva de 24 horas de servicio continuo, calculando con base en el consumo de 600 lt por cama/camilla al día.", "5. Cuando el prestador de servicios de salud cuente con mas de una infraestructura y estas se puedan vincular funcionalmente entre si, lo harán mediante tunel o puente cubierto, o muro(s) colindante(s) que cuenten con acceso (s) que intercomuniquen las infraestructuras, de uso exclusivo del prestador y adicionalmente cumplen con las siguientes caracteristicas:", "5.1. Ancho que permita la movilización de camas, camillas, sillas de ruedas, equipos biomédicos  y personal para el traslado de los pacientes  en condiciones seguras.", "5.2. El piso del túnel o puente debe ser uniforme y de material antideslizante o con elementos que garanticen esta propiedad en todo su recorrido, con pasamanos d a ambos lados y con protecciones laterales hacia espacios libres.", "5.3. Lo anterior siempre y cuando la norma urbanística de la jurisdicción donde se localizan las sedes hayan aprobado esta forma de vinculación funcional entre las mismas.", "5.4. Esta edificación se podrá habilitar como una o varias sedes, de acuerdo con lo que determine el prestador de servicios de salud", "Edificaciones de uso mixto", "6. Cuando en una edificación de uso mixto funcione más de un prestador de servicios de salud, cada uno cuenta con infraestructura separada y delimitada físicamente. Se pueden compartir las salas de espera y las unidades sanitarias.", "7. En edificaciones de uso mixto pueden funsionar los prestadores de servicios de salud que oferten y presten servicios de los grupos de consulta externa. de apoyo diagnóstico y complementación terapeutica y los servicios del grupo quirurgico que realicen exclusivamente procedimientos de cirugia ambulatoria.", "Edificaciones de uso exclusivo en salud y edificaciones de uso mixto", "8. Los prestadores de servicios de salud ubicados en edificaciones de hasta tres (3) pisos o niveles contados a partir del nivel más bajo construido, y que funcione en segundo o tercer nivel o piso, cuentan con ascensor o rampa o sistema alternativo de elevación. El sistema alternativo de elevación no puede ser utilizado cuando se presten servicios hospitalarios, cirugía, urgencias o de atención del parto.", "9. Los sistemas alternativos de elevación deben cumplir con las siguientes condiciones:", "9.1. Su ubicación no interfiera con el acceso y evacuación de los usuarios por las escaleras", "9.2. Estén disponibles tanto para el acceso como para la evacuación de los usuarios", "9.3. Su manejo sea autonomo", "9.4. Garanticen seguridad durante su uso", "10. Las edificaciones con más de tres (3) pisos o niveles, contados a partir del nivel más bajo construido, cuentan con ascensor.", "11. En edificaciones donde se presten servicios de los grupos de internación, atención del parto, quirurgicos o urgencias para la movilización de pacientes en camilla, la cabina de los ascensores debe tener las dimensiones interiores mínimas de 2.20 de profundidad y de 1.20 ancho, que garanticen el traslado seguro de los pacientes. Las dimensiones de la cabina podrán ser variables en el o los ascensores que el prestador determine para la movilización de usuarios a pie o en silla de ruedas.", "12. Si se tienen escaleras o rampas, el piso debe ser uniforme y de material antideslizante o con elementos que garanticen esta propiedad en todo su recorrido, con pasamanos de preferencia a ambos lados y con protecciones laterales hacia espacios libres.", "13. Las edificaciones donde se presten servicios de salud cuentan con suministro de agua, energia eléctrica, conexión a la red de alcantarillado y sistemas de comunicaciones.", "14. En edificaciones donde se presten servicios de cirugía, atención del parto, laboratorio clínico, urgencias, gestión pre transfusional, dialisis, hospitalarios, imagénes diagnósticas, vacunación, servicio farmaceutico y los que requieran cadena de frio, cuentan con planta electrica.", "15. El prestador de servicios de salud que utilice equipos generadores de radiaciones ionizantes cuenta con licencia de práctica médica vigente expedida por la entidad competente.", "16. El prestador de servicios de salud que utilice fuentes radiactivas cuenta con autorización vigente de empleo de material radiactivo, expedida por la entidad reguladora competente", "17. Cada prestador de servicios de salud debe contar con el respectivo concepto sanitario que dé cumplimiento a lo establecido en la normatividad sanitaria vigente en aspectos tales como agua para consumo humano, gestión de residuos, control de vectores, orden y aseo, condiciones locativas, entre otros. Este concepto será emitido por las autoridades sanitarias correspondientes, en el marco de sus competencias, y debe considerar los servicios de apoyo como lavanderia y servicio de alimentación.\n\nCuando estos servicios de apoyo son contratados con terceros dichos proveedores deben contar con el concepto sanitario correspondiente a la actividad de bienes y servicios que presta.", "Generalidades de los ambientes y las áreas de los servicios y sus características", "18. Las áreas y ambientes de todos los servicios de salud cuentan con ventilación natural o artificial.", "19. Las áreas de circulación están libres de obstáculos de manera que permitan la movilización de pacientes, talento humano, usuarios y equipos biomédicos", "20. Los ambientes y áreas que hagan parte de cualquier servicio de salud, deben permitir la instalación y movilización de equipos biomedicos y personal necesarios para la atención del paciente en condiciones de rutina o de emergencia.", "21.En los servicios del grupo quirurgico, los ambientes y áreas clasificados como no restringidos, semirestringidos, deben señalizarse mediante la demarcación permanente en piso con material lavable y resistente al tráfico pesado, utilizando los siguientes colores", "21.1. Verde: Ambientes o áreas no restringidas", "21.2. Amarillo: Ambientes o áreas semi-restringidas", "21.3. Roja: Ambientes o áreas restringidas", "22. Cada uno de los pisos o niveles de la edificación cuenta con señalización y planos indicativos de las rutas de evacuación, salidas de emergencia y puntos de encuentro, visible al público en general.", "23. Si el prestador de servicios de salud no tiene habilitado el servicio de gestión pre-transfusional, pero realiza procedimientos de transfusión sanguínea en alguno de sus servicios habilitados, tiene disponibilidad de un área con iluminación y ventilación natural o artificial, para la ubicación de la dotación requerida de acuerdo con los componentes sanguíneos a transfundir.", "24. Cuando un prestador de servicios de salud realice procedimientos bajo sedación fuera de salas de cirugía, tiene disponibilidad de área o ambiente para la recuperación de pacientes que puede ser la misma área o ambiente donde se realiza el procedimiento, garantizando la privacidad del usuario.", "25. El prestador de servicios de salud que realice el proceso de esterilización, cuenta con:", "25.1. Ambiente o área de recibo de material contaminado.", "25.2. Ambiente o área de lavado", "25.3. Ambiente o área de secado", "25.4. Ambiente o área de empaque.", "25.5. Ambiente o área de esterilización", "25.6. Ambiente o área para almacenamiento de material esteril", "25.7. Mesón de trabajo con poceta", "25.8. Lavamanos, cuando el proceso se realice fuera del servicio de salud", "26. El prestador de servicios de salud que contrate el proceso de esterilización, dentro de su infraestructura cuenta con:", "26.1. Ambiente o área para lavado, limpieza y desinfección y entrega de material limpio al proveedor", "26.2.  Ambiente o área para la recepción y almacenamiento del material esteril", "27. El prestador de servicios de salud que realice el proceso de esterilización en una cetral de esterilización cuenta con los siguientes ambientes y áreas señalizadas unidireccionales y de circulación restringida.", "27.1. Ambiente de recibo y lavado de material contaminado", "27.2. Ambiente limpio con las siguientes áreas:", "27.2.1. Área de secado", "27.2.2. Área de empaque", "27.2.3. Área de esterilización", "27.3. Ambiente para almacenamiento de material esteril", "Caracteristicas de los ambientes y áreas que pueden ser requeridos en varios servicios de salud", "28. Consultorio: para efectos del presente manual se definen los siguientes tipos de consultorios de acuerdo con la oferta de servicios:", "28.1. Consultorio donde se realiza examen fisico: ambiente con mínimo 10 mt2 (sin incluir la unidad sanitaria) que cuenta con_", "28.1.1. área para entrevista", "28.1.2. área de examen", "28.1.3. Lavamanos. No se exige adicional si el consultorio cuenta con unidad sanitaria", "28.1.4. Las áreas están separadas entre si por barrera física fija o móvil, con excepción de los consultorios del servicio de urgencias, optometría y oftalmologia, donde no se requiere.", "28.2. Consultorio donde se realizan procedimientos: ambiente mínimo de 10 m2 (sin incluir la unidad sanitaria) que cuenta con:", "28.2.1. Área para entrevista.", "28.2.2. Área de procedimientos.", "28.2.3. Las áreas están separadas entre sí por barrera física fija.", "28.2.4. Mesón de trabajo.", "28.2.5. Poceta, cuando la requiera, según los procedimientos que el prestrador documente en el estándar de procesos prioritarios.", "28.2.6. Lavamanos. No se exige adiocnal si el consultorio cuenta con una unidad sanitaria.", "28.3 Consultorio odontológico con una unidad odontológica: Ambiente con mínimo 10 m2 (sin incluir la unidad sanitaria) cuenta con:", "28.3.1. Área para entrevista, si la requiere", "28.3.2. Área para unidad odontológica.", "28.3.3. Lavamanos. No se exige adicional si el consultorio cuenta con unidad sanitaria.", "28.3.4. Área con mesón de trabajo con poceta.", "28.4. Consultorio odontológico con más de una unidad odontológica: Ambiente con mínimo 10 m2 (sin incluir la unidad sanitaria) que cuenta con:", "28.4.1. Área adicional por cada unidad odontológica que permita la instalación y movilización de talento humano, pacientes, usuarios y equipos biomédicos.", "28.4.2. Barrera física fija o móvil entre las unidades odontológicas.", "28.4.3. Mínimo un lavamanos por cada tres unidades odontológicas o fracción.", "28.4.5. A partir de tres unidades odontológicas, adicional a lo mencionado en los numerales 28.4.1, 28.4.2 y 28.4.3, tiene disponibilidad de un ambiente con mesón de trabajo y poceta.", "29. Consultorio donde se realiza únicamente entrevista, no se realiza examen físico ni procedimientos: Ambiente con mínimo 4 m2 (sin incluir la unidad sanitaria), cuenta con:", "29.1. Área para entrevista, según el tipo de consulta.", "29.2. Lavamanos. No se exige adicional si el consultorio cuenta con unidad sanitaria.", "30. Sala de procedimientos: Es el ambiente donde se realizan procedimientos derivados de los servicios de salud. Para efectos del presente manual, se definen los siguientes tipos de sala:", "30.1. Sala de procedimientos o curaciones. \nAmbiente con mínimo 8 m2, que cuenta con:", "30.1.1. Mesón de trabajo", "30.1.2. Poceta, cuando la requiera, según los procedimientos que el prestador documente en el estándar de procedimientos prioritarios.", "30.1.3. Lavamanos", "30.2. Sala de procedimientos de Litotricia: \nAmbiente con dimensión variable acirde con la tecnólogía utilizada, que cuenta con mesón de trabajo con poceta y disponibilidad de:", "30.2.1. Vestidor para pacientes con área para casilleros.", "30.2.2. Área de recuperación.", "30.2.3. Unidad sanitaria.", "30.3. Sala de procedimientos endoscópicos:\nAmbiente con dimensión variable acorde con el tipo de tecnología utilizada y los procedimientos que se realicen, cuenta con:", "30.3.1. Área de procedimientos endoscópicos.", "30.3.2. Área de recuperación, que puede ser la misma área donde se realice el procedimiento endoscópico.", "30.3.3 Lavamanos.\nDisponibilidad de:", "30.3.4. Unidad sanitaria", "30.3.5. Vestidr para pacientes con área para casilleros que puede ser la misma unidad sanitaria con casilleros.", "30.3.6. Ambiente o área para almacenar materiales e insumos.", "30.3.7. Área de limpieza y desinfección de endoscopis con mesón de trabajo con poceta.", "30.3.8. Ambiente o área para almacenamiento de equipos biomédicos.", "30.4. Si se realiza procedimiento de monitorización electroencefalográfica con vídeo y radio, cuenta con:", "30.4.1. Ambiente con dimensión variable acorde con el tipo de tecnología utilizada.\nDisponibilidad de:", "30.4.2. Unidad sanitaria", "30.5. Si se realiza procedimientos terapéuticos con láser de argón o yag láser, cuenta con ambiente con dimensión variable acorde con el tipo de tecnología utilizada:", "31. Sistema de alarma cuando se cuente con red de distribución de gases medicinales.", "32. Puesto de enfermería\nÁrea con dimensión variable que, de acuerdo con las necesidades de cada servicio, cumplen con las siguientes características:", "32.1. Superficie de trabajo", "32.2. Permitela monitprización permanente de los pacientes o sistemas alternativos para su visualización.", "32.3. Cuenta con alarma o sistema de llamado de enfermería, donde se requiera.", "33. Ambiente o área de trabajo limpio, que cuenta con:", "33.1. Mesón de trabajo.", "33.2. Área para el almacenamiento y aislamiento de medicamentos.", "33.3. Lavamanos.", "34. Ambuiente de trabajo sucio, que cuenta con:", "34.1. Mesón de trabajo con poceta.", "34.2. Lavamanos.", "35. Estación de enfermería, que cuenta con:", "35.1. Puesto de enfermería.", "35.2. Ambiente o área de trabajo limpio.", "35.3. Ambiente de trabajo socio.\nDisponibilidad de los siguientes ambientes o áreas:", "35.4. Área o ambiente para el depósito de equipos biomédicos con dimensión variable de acuerdo con las necesidades del servicio.", "35.5. Área o ambiente para depósito de ropa limpia de dimensión variable de acuerdo con las necesidades del servicio.", "35.6. Ambiente para depósito de ropa sucia, con dimensión variable de acuerdo con las necesidades del servicio.", "35.7. Lavapatos cuando el servicio de salud lo requiera.", "35.8. Unidad sanitaria.", "36. Baño, ambiente que cuenta con:", "36.1. Sanitario.", "36.2. Lavamanos.", "36.3. Ducha.", "36.4. Alarma o sistema de llamado, donde se requiera.", "36.5. Puertas corredizas o con apertura hacia el exterior.", "37. Unidad sanitaria, ambiente que cuenta con:", "37.1. Sanitario.", "37.2. Lavamanos.", "38. La unidad sanitara adaptada para personas con movilidad reducida cuenta con:", "38.1. Sanitario", "38.2 Lavamanos.", "38.3. Dimensiones que permita el desplazamiento del paciente y maniobra en su interior, las puertas tienen un ancho que permite el fácil acceso de pacientes en sillas de ruedas.", "38.4. Puertas corredizas o con apertura hacia el exterior.", "38.5. Accesorios que facilite la accesibilidad, movilidad y seguridad del usuario.", "38.6. Alarma o sistema de llamado.", "39. Bateria sanitaria, ambiente que cuenta con sanitarios en serie y lavamanos, discriminadas por sexo, serán separadas con barreras físicas fijas o divisiones en materiales resistentes, inoxidables e impermeables, con espacios libres que faciliten la ventilación y las labores de aseo. Se instalará adicionalmente un orinal para sexomasculino. Como mínimo uno de los sanitarios de la bateria debe ser apto para personas com movilidad reducida discriminado por sexo.", "40. Sala de espera:", "40.1. Ambiente o área con dimensión variable de acuerdo al servicio o servicios, independiente de las áreas de circulación, que cuenta con ventilación e iluminación natural y/o artificial.", "40.2. Disponibilidad de unidades sanitarias discriminadas por sexo o baterias sanitarias.", "Generalidades de las condiciones de orden, aseo, limpieza y desinfecciones", "41. Las condiciones de orde, aseo, limpieza y desinfección son evidentes y responde a un proceso dinámico de acuerdo con los servicios prestados.", "42. En las edificaciones destinadas a la prestación de servicios de salud, los pisos deben ser resistentes a factores ambientales, deben ser continuos, antideslizantes, impermeables, lavables, sólidos, resistentes a procesos de lavado y desinfección. Cuando se tengan dilataciones y juntas, estas deben ser selladas de manera que ofrezcan continuidad de la superficie.", "43. Los cielo rasos o techos y paredes o muros deben ser impoermeables, lavables, sólidos, resistentes a fctores ambientales e incombustibles y de superficie lisa y continua.", "44. En los servicios de cirugía, atención del parto, ambiente TPR, salas de procedimientos, consultorios donde se realicen procedimientos, servicios de internación en cuidado básico, intermedio e intensivo, urgencias, diálisis, hemodinámia e intervencionismo, laboratorios, gestión pre transfunsional, quimioterapia, consulta odontológica y los ambientes o áreas donde se requieran procesos de limpieza y asepsia más profundos, adicional al criterio anterior, la unión entre paredes o muros y el piso debe ser en media caña evitando la formación de aristas o de esquinas.", "45. En los servicios de cirugía, atención del parto, ambiente TPR y el ambiente de esterilización, la unión entre cielo raso o techo y la pared o muro y la unión entre paredes o muros, debe contar con media caña, evitando la formación de aristas o de esquinas.", "Modalidad extramural unidad móvil, jornada de salud y domiciliaria", "46. Cuando un prestador de servicios de salud preste sus servicios exclusivamente en la modalidad extramural, la sede cuenta con:", "46.1. Ambiente o área para el almacenamiento de medicamentos o dispositivos médicos e isumos, cuando se requiera.", "46.2. Ambiente o área para el almacenamiento de equipos biomédicos.", "46.3. Ambiente o área para el archivo de las historias clínicas y registros.", "47. Disponibilidad de ambiente o área para las labores de aseo, limpieza y desinfección para las unidades móviles.", "Movilidad extramural domiciliaria.", "48. El domicilio del paciente cumple con las siguientes condiciones:", "48.1. Servicios públicos domiciliarios: Acueducto, alcantarillado, energía eléctrica y sistema de comunicación.", "48.2. Unidad sanitaria o baño.", "Modalidad extramural Unidad móvil, terrestre y acuática.", "49. Las condiciones de orden, aseo, limpieza y desinfección son evidentes y responden a un proceso dinámico de acuerdo con los servicios prestados.", "50. La unidad móvil cuenta con:", "50.1. De acuerdo con los servicios a prestar, los ambientes y áreas cumplen", "50.2. Suministro de agua potable de manera permanente.", "50.3. Tanque para el almacenamiento de aguas residuales. Las aguas residuales no se vierten en la vía pública o en el cauce fluvial.", "50.4. Identificación visual como unidad móvil terrestre o acuática según aplique.", "50.5. Acceso al servicio de energía eléctrica o fuente de energía alternativa.", "50.6. Señalización y condiciones que garanticen la seguridad durante el abordaje, incluyendo el ingreso de personas con discapacidad.", "50.7. Estructuras firmes para el ingreso y salida de pacientes y usuarios, con protecciones laterales a espacios libres.", "50.8. Señalización de áreas restringidas al interior de la unidad móvil.", "50.9. Barreras o mecanismos que impidan el ingres de usuarios a las áreas restringidas.", "50.10. Para unidades móviles marítimas o fluviales, las uniones con tierra firme son continuas, sin desniveles y permiten el flujo de camillas y sillas de ruedas.", "Modalidad telemedicina - Prestador remisor", "51. Adicional a los criterios del estándar de infraestructura enunciados que le aplique, el prestador de servicios de salud cuenta con:", "51.1. Conectividad que garantice la prestación de servicios de salud con integridad y continuidad de acuerdo con el método de transferencia de información que utilice (sincrónico o asincrónico).", "51.2. Plataformas tecnológicas que garanticen la seguridad y privacidad de la información y la disponibilidad permanente para prestar los servicios de salud, cumpliendo con los criterios de seguridad, privacidad y protección de datos personales establecidos en la normatividad o lineamientos que regulen la materia.", "51.3. Suministro de energía eléctrica o baterias que permitan el uso de los instrumentos de comunicación y de los equipos biomédicos necesarios.", "51.4. Nivel de iluminación homogénea con luz fluorescente blanca fría y no mezclar tipos de iluminación cálida con fría.", "Modalidad telemedicina - Prestador referencia.", "52. Adicional a los criterios del estándar de infraestructura enunciados que le aplique, el prestador de servicios de salud cuenta con:", "52.1. Conectividad que garactice la pestación de servicios de salud con integridad y continuidad de acuerdo con el método de transferencia de información que utilice (sincrónico o asincrónico).", "52.2. Plataformas tecnológicas que garanticen la seguridad y privacidad de la información y la disponibilidad permanente para prestar los servicio de salud, cumpliendo con los criterios de seguridad, privacidad y protección de datos personales establecidos en la normatividado lineamientos que regulen la materia.", "52.3. Suministro de energía eléctrica o baterias que permitan el uso de los instrumentos de comunicación y de los equipos biompedicos necesarios.", "52.4. Nivel de iluminación homogénea.", "Modalidad telemedicina - Prestador de referencia exclusivo.", "53. Cuando el prestador de servicios de salud preste sus servicios exclusivamente en la modalidad de telemedicina como prestador de referencia, cuenta con:", "53.1. Ambiente exclusivo para la realización de la atención a distancia que garantiza la privacidad y la confidencialidad durante la atención, la seguridad de los equipos frente a la extracciónno autorizada y condiciones ambientales para su correcto funcionamiento,libre de interferencias visuales y sonoras.", "53.2. Conectividad que garantice la prestación de servicios de salud con integridad y continuidad de acuerdo con el método de transferencia de información que utilice (sincrónico o asincrónico)", "53.3. Plataformas tecnológicas que garantizan la seguridad y privacidad de la información y la disponibilidad permanente para prestar los servicios, cumpliendo con los criterios de seguridad, privacidad y protección de datos personales establecidos en la normatividad que regule la materia.", "53.4. Suministro de energía eléctrica o baterias que permitan el uso de los instrumentos de comunicación y de los equipos biomédicos cuando aplique.", "53.5. Nivel de iluminación homogénea."], "DO": ["1. El prestador de servicios de salud cuenta con el registro de la relación de los equipos biomédicos requeridos para la prestación de servicios de salud, este registro cuenta como mínimo con la siguiente información:", "1.1. Nombre del equipo biomédico.", "1.2. Marca.", "1.3. Modelo.", "1.4. Serie.", "1.5. Registro sanitario para dispositivos médicos o permiso de comercialización para equipos biomédicos de tecnología controlada, cuando lo requiera.", "1.6. Clasificación por riesgo, cuando el equipo lo requiera.", "2. El prestador de servicios de salud garantiza las condiciones técnicas de calidad de los equipos biomédicos, para lo cual cuenta con:", "2.1. Programa de mantenimiento preventivo de los equipos biomédicos, que incluya el cumplimiento de las recomendaciones establecidas por el fabricante o de acuerdo con el protocolo de mantenimiento que tenga definido el prestador, éste último cuando no esté definido por el fabricante.", "2.2. Hoja(s) de vida del(los) equipo(s) biomédico(s), con los registros de los mantenimientos preventivos y correctivos, según corresponda.", "3. El prestador de servicios de salud cuenta con un programa de capacitación en el uso de dispositivos médicos cuando éstos lo requieran, el cual puede ser desarrollado por el fabricante, importador o por el mismo prestador.", "4. La dotación de los servicios de salud está en concordancia con lo definido por el prestador en el estándar de procesos prioritarios.", "5. La suficiencia de equipos biomédicos está relacionada con la frecuencia de uso de los mismo, incluyendo los tiempos del proceso de esterilización, cuando aplique.", "6. El mantenimiento de los equipos biomédicps es ejecutado por el talento humano profesional, tecnólogo o técnico en áreas relacionadas. Este mantenimiento puede ser realizado directamente por el prestador de servicios de salud o mediante contrato o convenio con un tercero.", "7. Los prestadores que oferten servicios de salud en modalidad extramural no pueden elaborar ni adaptar dispositivos médicos sobre medida.", "8. Los servicios de salud que requieren carro de paro, cuenta con la siguiente dotación:", "8.1. Desfibrilador bifásico con sistema de visualización integrado, capacidad de cardioversión, marcapasos transcutáneo y paletas para adultos y pediátricas según aplique.", "8.2. Resucitador  pulmonar  manual.", "8.3. Aspirador o sistema de vacío.", "8.4. Monitor de signos vitales con accesorios que cuenta como mínimo con:", "8.4.1. Trazado electrocardiográfico si no está incorporado en el desfibrilador", "8.4.2.Presión no invasiva", "8.4.3. Saturación de oxígeno que puede estar integrado en el monitor o externo", "8.4.4. Batería", "8.5. Laringoscopio con hojas rectas y curvas para adultos y pediátricas, según aplique", "8.6. Medicamentos, dispositivos médicos e insumos, definidos por el prestador.", "9. Las instituciones prestadoras de servicios de salud con servicios de hospitalización, hospitalización paciente crónico con y sin ventilador, cuidado intensivo neonatal, pediátrico y adulto, urgencias y del grupo quirúrgico, en la modalidad intramural, cuentan con equipos de telecomunicaciones de doble via y conectividad para notificar a la Red de Donación y Trasplantes sobre la existencia de un posible donante.", "10. Las instituciones prestadoras de servicios de salud con servicios de cuidado intensivo pediátrico y adulto que adicionalmente  habiliten el servicio quirúrgico de neurocirugía, cuentan con equipo biomédico para  realizar pruebas auxiliares en el diagnóstico de muerte encefálica, según lo documentado en el estándar de procesos prioritarios.", "11. En los sistemas centralizados de gases medicinales, se realiza el mantenimiento a los componentes del sistema por el personal capacitado por el fabricante.", "12. El prestador de servicios de salud que realice el proceso de esterilización en un área o ambiente dentro o fuera del servicio de salud cuenta con los equipos biomédicos y la dotación de acuerdo con el método utilizado.", "13. Si el prestador de servicios de salud no tiene habilitado el servicio de gestión pre transfusional, pero realiza procedimientos de transfusión sanguínea en alguno de sus servicios habilitados cuenta con:", "13.1. Nevera o depósito fria para el almacenamiento de sangre o de sus componentes con sistema de control de temperatura entre 1ºC y 6ºC y alarma audible o sistema de monitoreo que alerte cambios próximos al límite en que la sangre o sus componentes puedan deteriorarse.", "13.2. Equipo para descongelar plasma, cuando se requiera, con sistema de control de temperatura.", "13.3 Congelador para la conservación de plasma o crioprecipitados con registro y control de temperatura por debajo de -18ºC y sistema de alarma audible que alerte cambios próximos al límite en que el componente almacenado pueda deteriorarse, cuando se requiera.", "13.4. Agitador  o rotador de plaquetas con sistema de control de temperatura  entre 20ºC y 24ºC cuando se requiera.", "13.5. Nevera para transporte de componentes sanguíneos, donde se garantice la cadena de frío.", "14. Los servicios de salud donde se realicen procedimientos  bajo sedación fuera de salas de cirugía y monitorización electroencefalográfica con video y radio cuentan con carro de paro.", "15. En los servicios de los grupos quirúrgico, internación y el servicio de urgencias, el prestador de servicios de salud cuenta con accesorios para garantizar empaque cerrado y transporte de los elementos sucios y limplos, como compreseros, vehículos para ta recolección interna de residuos, carros de comida, instrumental, entre otros.", "Modalidad extramural", "16. Adicional a los criterios enunciados del presente estándar, que le apliquen, el prestador de servicios de salud cuenta con:", "16.1. Sistemas de telecomunicaciones de doble vía.", "16.2. Cuando se realicen pruebas para la detección de eventos de interés en salud pública, cuenta con:", "16.2.1. Microscopio", "16.2.2. Cinta métrica", "16.2.3. Báscula", "Modalidad telemedicina", "17. El prestador de servicios de salud realiza el mantenimiento de la tecnología de información y de comunicaciones para avalar la calidad de la información, y adicionalmente cuenta con:", "17.1. Prestador remisor", "17.1.1. Documento firmado por un ingeniero biomédico con tarjeta profesional vigente, que certifique que:", "17.1.1.1. Los dispositivos periféricos necesarios, de acuerdo con el tipo de servicios ofertados, garantizan la obtención de la información requerida por el prestador de referencia.", "17.1.1.2. Los equipos de captura utilizados por  el prestador de servicios de salud garantizan que la información obtenida es equivalente a la original, de manera que al ser reproducida se garantice su calidad y confiabilidad.", "17.1.1.3. Los parámetros de digitalización y compresión seleccionados en los equipos durante la captura de datos o imágenes garantizan la resolución necesaria para permitir el diagnóstico.", "17.1.1.4. Si el prestador de servicios  de salud realiza consulta dermatológica en la modalidad de telemedicina cuenta con cámara digital de alta resolución que permita un fácil enfoque de las lesiones de piel y revisión de las imágenes capturadas previo a la transmisión al dermatólogo.", "17.1.2. Documento firmado por un ingeniero de sistemas con tarjeta profesional vigente, que certifique que:", "17.1.2.1. Los dispositivos utilizados para transferencia de información sincrónica por videoconferencia garantizan óptima fidelidad y calidad del video y sonido para el prestador remisor y para e! prestador de referencia.", "17.1.2.2. El software utilizado se adapta al cambio en la disponibilidad del ancho de banda sin perder conexión. En el caso que la videoconferencia sea grabada se deberán contemplar todos criterios de seguridad informática, que permita resguardar adecuadamente la confidencialidad y privacidad del paciente.", "17.1.2.3. Las pantallas o monitores grado médico utilizados para el despliegue de imágenes cuentan con una distancia máxima de 0.25 milímetros entre píxeles\n(dot pitch), para garantizar la interpretación adecuada de la información recibida.", "17.2. Prestador de referencia.", "17.2.1. Documento firmado por un ingeniero de sistemas con tarjeta profesional vigente, que certifique que:", "17.2.1.1. Los dispositivos utilizados para transferencia de información sincrónica por videoconferencia garantizan una óptima fidelidad y calidad del video y sonido tanto para el prestador remisor como para el prestador de referencia.", "17.2.1.2. El software utilizado se adapta al cambio de la disponibilidad del ancho de banda sin perder la conexión.", "17.2.1.3. En el caso que la videoconferencia sea grabada se deberán contemplar todos los criterios de seguridad informática, que permita resguardar adecuadamente la confidencialidad y privacidad del paciente.", "17.2.2. Las pantallas o monitores grado médico utilizados para el despliegue de imágenes cuentan con una distancia máxima de 0.19 milímetros entre pixeles (dot pitch), resolución mínima de 1024 x 768 pixeles, como mínimo un ratio de contraste de 500:1 y mínimo de luminancia (brillo) de 250 cd/m2 que permita garantizar la interpretación adecuada de la información recibida."], "MD": ["1. El prestador de servicios de salud lleva registros con la información de todos los medicamentos para uso humano requeridos en la prestación de los servicios que oferte; dichos registros cuentan con la siguiente información:", "1.1. Principio activo.", "1.2. Forma farmacéutica.", "1.3. Concentración", "1.4. Lote.", "1.5. Fecha de vencimiento.", "1.6. Presentación comercial.", "1.7. Unidad de medida.", "1.8. Registro sanitario vigente o permiso cuando se autorice, expedido por el Invima.", "2. Los dispositivos médicos de uso humano requeridos para la prestación de los servicios de salud cuentan con información documentada que dé cuenta de la verificación y seguimiento de la siguiente información:", "2.1. Descripción.", "2.2. Marca del dispositivo.", "2.3. Serie (cuando le aplique).", "2.4. Presentación comercial.", "2.5. Registro sanitario vigente o permiso de comercialización expedido por el Invima.", "2.6. Clasificación por riesgo (información consignada en el registro sanitario o permiso de comercialización).", "2.7. Vida útil, cuando le aplique.", "2.8. Lote", "2.9. Fecha de vencimiento", "3. Los reactivos de diagnóstico in vitro requeridos para la prestación de los servicios de salud cuentan con la información documentada que dé cuenta de la verificación y seguimiento de la siguiente información:", "3.1. Nombre", "3.2. Marca", "3.3. Presentación comercial", "3.4. Registro sanitario vigente o permiso de comecialización expedido por el Invima.", "3.5. Clasificación del riesgo santario", "3.6. Vida útil, cuando aplique", "3.7. Fecha de vencimiento y lote.", "4. El prestador de servicios de salud cuenta con información documentada de los procesos generales según aplique, para:", "4.1. Selección", "4.2. Adquisición", "4.3. Transporte", "4.4. Recepción", "4.5. Almacenamiento", "4.6. Conservación", "4.7. Control de fechas de vencimiento", "4.8. Control de cadena de frío, manejo de contingencias con la cadena de frío", "4.9. Distribución", "4.10. Dispensación", "4.11. Devolución", "4.12. Disposición final", "4.13. Seguimiento al uso de medicamentos, homeopáticos, fitoterapéuticos, medicamentos biológicos, componentes anatómicos, dispositivos médicos (incluso los sobre medida, elementos de rayos X y de uso odontológico), reactivos de diagnóstico in vitro; así como de los demás insumos asistenciales que se utilicen incluidos los que se encuentran en los depósitos o almacenes del prestador de servicios de salud y en la modalidad extramural.", "5. El prestador de servicios de salud que realice algún tipo de actividad con medicamentos de control especial para la prestación de servicios de salud cuenta con la resolución de autorización vigente, expedida por el Fondo Nacional de Estupefacientes o la entidad que haga sus veces.", "6. El prestador de servicios de salud cuenta con información documentada de la planeación y ejecución de los programas de farmacovigilancia, tecnovigilancia y reactivovigilancia, que garanticen el seguimiento al uso de medicamentos, dispositivos médicos (incluidos los sobre medida) y reactivos de diagnóstico in vitro, cuando aplique.", "7. El prestador de servicios de salud que cuente con reservas de medicamentos, homeopáticos, fititerapéuticos, medicamentos biológicos, componentes anatómicos, dispositivos médicos (incluidos los sobre medida), reactivos de diagnóstico in vitro, y demás insumos asistenciales, debe garantizar que se almacenen en condiciones apropiadas de temperatura, humedad, ventilación segregación y seguridad de acuerdo con las condiciones definidas por el fabricante o el banco del componente anatómico, según aplique, y contar con instrumento para medir humedad reltiva y temperatura y evidencia su registro, control y gestión.", "8. Para la aplicación del protocolo de lavado de manos o higienización, los servicios de salud cuentan con los insumos de aseo, limpieza y secado que garanticen su cumplimiento.", "9. La suficiencia de dispositivos médicos está relacionada con la frecuencia de uso de los mismos, incluyendo los tiempos del proceso de esterililización, cuando aplique.", "10. El prestador de servicios de salud cuenta con paquete para el manejo de derrames y rupturas de medicamentos, ubicado en un lugar de fácil acceso, visible y con adecuada señalización, disponible para su uso en los servicios y ambientes donde se requieran. El prestador de servicios de salud define su contenido de acuerdo con los medicamentos utilizados y lo sugerido por el fabricante en las fichas técnicas.", "11. En los servicios donde se requiera carro de paro, adicional a la dotación definida en el presente manual, los medicamentos, dispositivos médicos e insumos deber ser definidos por el prestador de servicios de salud de acuerdo con la morbilidad. riesgos de complicaciones más frecuentes y lo documentado para el procedimiento de reanimación cerebro cardio pulmonar.", "12. El prestador debe mantener condiciones de almacenamiento, conservación, control de fechas de vencimiento, uso y custodia de los medicamentos, dispositivos médicos e insumos contenidos en los carros de paro.", "13. Si el prestador de servicios de salud no tiene habilitado el servicio de gestión pre transfusional, pero realiza procedimientos de transfusión, cuenta con convenio o contrato vigente con un banco de sangre certificado por la autoridad competente para el suministro de sangre, componentes sanguíneos y la realización de las pruebas pre transfusionales cuando el prestador de servicios de salud no las realice", "14. Cuando el prestador de servicios de salud fabrique en su institución gases medicinales, cuenta con la certificación vigente de Buenas Prácticas de Manufactura expedida por el Invima o la entidad que haga sus veces.", "15. En los servicios de transporte asistencial, atención prehospitalaria y urgencias cuenta con kit de emergencias para la atención a víctimas de ataques con agentes químicos.", "Modalidad extramural unidad móvil, jornada de salud y domiciliaria.", "16. Adicional a los criterios enunciados de presente estándar, que le aplique a estas modalidades, el prestador de servicios en salud cuenta con:", "16.1. Dispositivos médicos e insumos asistenciales según la patalogía del paciente o eventos de interés en salud pública cuando se requiera.", "16.2. Medicamentos de acuerdo con inventario establecido por el prestador acorde a lo documentado en sus procesos prioritarios, cuando se requiera.", "Modalidad telemedicina", "Prestador remisor y prestador de referencia.", "17. El prestador de servicio de salud cumple con los criterios que le apliquen del presente estándar."], "PP": ["1. El prestador de servicios de salud cuenta con una política de seguridad del paciente acorde con los lineamientos expedidos por el Ministerio de Salud y Protección Social.", "2. El prestador de servicios de salud realiza actividades encaminadas a gestionar la seguridad del paciente.", "3. El prestador de servicios de salud cuenta con un comité o instancia que orienta y promueve la política de seguridad del paciente, el control de infecciones y ta optimización del uso de antibióticos, cuando tos prescriba o administre. En el caso de profesionales independientes de salud podrá ser el mismo prestador.", "4. El prestador de servicios de salud adopta y realiza las siguientes prácticas seguras, según aplique a su servicio de salud y cuenta con información documentada para:", "4.1. Asegurar la correcta identificación del paciente en los procesos asistenciales. (que incluya como mínimo dos identificadores: nombre completo y número de identificación)", "4.2. Gestionar y desarrollar una adecuada comunicación entre las personas que atienden y cuidan a los pacientes que incluyan enfoques diferenciales.", "4.3. Detectar, prevenir y reducir infecciones asociadas con la atención en salud (que incluya protocolo de higiene de manos o higienización con soluciones a base de alcohol).", "4.4. Detectar, ana!izar y gestionar eventos adversos.", "4.5. Garantizar la funcionalidad de los procedimientos de consentimiento  informado.", "4.6. Mejorar la seguridad en la utilización de medicamentos, en los servicios donde aplique.", "4.7. Prevenir y reducir la frecuencia de caídas, en los servicios donde aplique.", "4.8. Garantizar la atención segura de ta gestante y el recién nacido, en los servicios donde aplique.", "4.9. Prevenir complicaciones asociadas a disponibilidad y manejo de sangre, componentes y a la transfusión sanguínea, en los servicios donde aplique.", "4.10. Prevenir úlceras por presión, en los servicios donde aplique.", "4.11. Mejorar la seguridad en los procedimientos quirúrgicos, en los servicios donde aplique.", "5. El prestador de servicios de salud promueve la cultura de seguridad del paciente que involucra a todo el personal de manera sistemática con un enfoque educativo no punitivo mediante:", "5.1. Capacitación del personal en el tema de seguridad del paciente y en los principales riesgos de la atención.", "5.2. Actividades donde se ilustra al paciente y sus allegados en el autocuidado de su seguridad.", "6. El prestador de servicios de salud cuenta con información documentada de las actividades y procedimientos que se realizan en el servicio acordes con su objeto, alcance y enfoque diferencial, mediante guías de práctica clínica- GPC, procedimientos de atención, protocolos de atención y otros documentos que el prestador de servicios de salud determine, dicha  información  incluye talento humano, equipos biomédicos, medicamentos y dispositivos médicos e insumos requeridos.", "7. La información documentada es conocida mediante acciones de formación continua por el talento humano encargado y responsable de su aplicación, incluyendo el talento humano en entrenamiento, y existe evidencia de su socialización.", "8. Las guías de práctica clínica y protocolos a adoptar son en primera medida los que disponga el Ministerio de Salud y Protección Social. En caso de no estar disponibles, o si existe nueva evidencia científica que actualice alguna o algunas de las recomendaciones de las guías de práctica clínica o requerimientos de los protocolos, el prestador de servicios de salud adopta, adapta o desarrolla guías de práctica clínica o protocolos basados en evidencia científica, publicados nacional o internacionalmente.", "9. El prestador de servicios de salud de acuerdo con las patologías más frecuentes en el servicio define la guía o guías de práctica clínica a adoptar, o adaptar o desarrollar.", "10. El prestador de servicios de salud cuenta con información documentada de la adopción, o adaptación o desarrollo de guías práctica clínica o protocolos basados en evidencia científica.", "11. Los servicios de salud donde se atiendan pacientes con enfermedades terminales, crónicas, degenerativas e irreversibles, a los cuales se determine el manejo del dolor y cuidado paliativo, cuentan con información documentada para su manejo.", "12. El prestador de servicios de salud cuenta con la siguiente información documentada:", "12.1. Detección, prevención y disminución del riesgo de accidentes e incidentes de carácter radiológico, en los servicios donde aplique.", "12.2. Aseo, limpieza y desinfección de áreas y superficies.", "12.3. Procedimiento de reanimación cerebro cardio pulmonar, en los servicios donde se realice.", "12.4. Acciones para prevenir las flebitis infecciosas, químicas y mecánicas en los servicios donde se realicen procedimientos de venopunción.", "12.5. Aspectos de bioseguridad acordes con las condiciones y características del servicio.", "12.6. Descontaminación por derrames de sangre u otros fluidos corporales.", "12.7. Manejo de gases medicinales que incluya como mínimo la atención de emergencias y sistema de alarma, cuando se utilicen.", "13. El prestador de servicios de salud que realice el proceso de esterilización cuenta con la siguiente información  documentada:", "13.1. Buenas prácticas de esterilización de acuerdo con los procedimientos y técnicas que se utilicen, que describa como mínimo los siguientes aspectos:", "13.1.1 Recibo de productos contaminados y entrega de material estéril.", "13.1.2. Transporte", "13.1.3. Lavado, secado y lubricación.", "13.1.4. Empaque.", "13.1.5. Etiquetado.", "13.1.6. Esterilización.", "13.1.7. Almacenamiento.", "13.1.8. Verificación de la integridad del material estéril", "13.1.9. Control de calidad que incluya el análisis de los reportes de dicho control, para la toma de medidas preventivas y correctivas.", "14. Cuando un prestador de servicios de salud contrate el proceso de esterilización con un tercero, cuenta con un contrato, convenio o acuerdo escrito entre las partes, el cual debe incluir como mínimo las características de calidad de los productos, la supervisión del estado de las instalaciones y la aplicación de los procedimientos del tercero para realizar el proceso. No obstante, el prestador de servicios de salud que requiere el proceso de esterilización es el responsable de garantizar la esterilidad y el desempeño del producto final.", "15. Los prestadores de servicios de salud tienen definidos procedimientos que garanticen el cumplimiento del no reúso de dispositivos médicos cuando el fabricante así lo haya establecido.", "16. Hasta tanto el Ministerio de Salud y Protección Social regule la materia, el prestador de servicios de salud podrá reusar dispositivos médicos, siempre y cuando el fabricante de dichos dispositivos autorice su reúso. En tal caso, el prestador de servicios de salud cuenta con información documentada que defina:", "16.1. Los procedimientos, siguiendo las recomendaciones del fabricante, para el reprocesamiento y control de calidad que demuestren la eficacia, desempeño y esterilidad del producto.", "16.2. Acciones de seguimiento a través de los comités de infecciones, de seguridad del paciente y del programa de tecnovigilancia, que garanticen que el dispositivo no ha perdido la eficacia y desempeño para el cual fue diseñado, ni exponga al riesgo de infecciones o complicaciones al usuario.", "16.3. Los profesionales independientes de salud realizarán el seguimiento a través del programa de tecnovigilancia.", "17. Para la referencia de pacientes, el prestador de servicios de salud cuenta con la siguiente información documentada:", "17.1. Estabilización del paciente antes del traslado.", "17.2. Medidas para el traslado.", "17.3. Lista de chequeo de los documentos necesarios para el traslado que incluya:", "17.3.1. Diligenciamiento del formato de referencia de pacientes.", "17.3.2. Resultados de apoyos diagnósticos realizados al paciente.", "17.3.3. Resumen de historia clínica.", "17.3.4. Mecanismos tecnológicos que le permitan realizar el proceso (software, correo, entre otros).", "17.3.5. Talento humano que debe responsabilizarse de cada una de las etapas del proceso.", "17.3.6. La referencia de pacientes que se detecten como víctimas de violencia sexual debe hacerse a un servicio de urgencias.", "18. Cuando se realicen procedimientos bajo sedación fuera de salas cirugía, el prestador de servicios de salud cuenta con información documentada para:", "18.1. Realizar la sedación", "18.2. Definición de la atención por médico especialista en anestesiología cuando se identifiquen riesgos para el paciente relacionados con la sedación", "18.3. Manejo de emergencias.", "18.4. Seguimiento al riesgo, que incluya fichas técnicas de indicadores de complicaciones terapéuticas y medicamentosas, relacionadas con la sedación, medición, seguimiento y planes de mejoramiento.", "18.5. Lista de chequeo, consignada en la historia clínica del paciente, que incluya la verificación de:", "18.5.1. Evaluación de la vía aérea.", "18.5.2. Determinación del tiempo de ayuno.", "18.5.3. Registro de monitoreo del nivel de conciencia, la saturación de oxígeno, frecuencia cardíaca, tensión arterial y frecuencia respiratoria.", "18.5.4. Registro de las variables hemodinámicas y respiratorias, a intervalos regulares", "18.6. Observación bajo la supervisión del profesional que realiza la sedación.", "18.7. Todos estos registros se deben realizar antes, durante la intervención y hasta el momento del egreso del paciente.", "18.8. Recomendaciones de egreso suministradas al acompañante o acudiente.", "19. Si el prestador de servicios de salud no tiene habilitado el servicio de gestión pre transfusional, pero realiza procedimientos de transfusión sanguínea en alguno de sus servicios de salud habilitados, cuenta con la siguiente información documentada:", "19.1. Transporte, conservación, embalaje y remisión de muestras al banco de sangre para la realización de pruebas pre transfusionales.", "19.2. Manejo, investigación y análisis de las reacciones adversas a las transfusiones sanguíneas y procesos de hemovigilancia.", "19.3. Guía de práctica clínica para el uso de componentes sanguíneos.", "20. La Institución Prestadora de Servicios de Salud que cuenten con servicios de salud de los grupos de consulta externa, internación o el servicio de urgencias, cuenta con:", "20.1. Documento del proceso institucional que orienta la atención en salud de las víctimas de violencias sexuales.", "20.2. Documento que dé cuenta la conformación del equipo institucional para la atención integral en salud para las víctimas de violencias sexuales", "21. El Profesional Independiente de Salud y las Entidades con Objeto So ión documentada sobre la toma, procesamiento, control de calidad y entrega de resultados.", "27.2. Controles de calidad realizados por un servicio de laboratorio clínico que puede ser propio o contratado para tal fin. cuando aplique, de acuerdo a las especificaciones del fabricante.", "27.3. Análisis de los reportes del control de calidad y toma de medidas preventivas y correctivas.", "Adicional a los criterios enunciados que le aplique, para las siguientes modalidades el prestador de servicios de salud cuenta con la siguiente información documentada:", "Modalidad extramural jornadas en salud y unidad móvil", "28. Orientación a los usuarios sobre las condiciones, requisitos y restricciones de acceso, permanencia y salida del vehículo, en condiciones de rutina o en condiciones de emergencia. a cargo del conductor del vehículo y el talento humano en salud.", "29. Mecanismos que garanticen comunicación para el seguimiento de los pacientes que lo requieran.", "30. Mecanismos de supervisión de las actividades realizadas en el marco de los eventos de interés en salud pública, cuando aplique.", "Modalidad telemedicina - Prestador Remísor", "31. Información documentada de la prestación de servicios en esta modalidad que evidencie:", "31.1. La o las categorías de tetemedicina que se ofrece(n) en cada uno de  los servicios habilitados en dicha modalidad y si se presta el servicio como prestador remisor o como prestador de referencia.", "31.2. Los flujos de la información", "31.3.Los responsables de la atención", "31.4. El método de comunicación que se utiliza (sincrónico o asincrónico) para la atención y los criterios para la identificación de los casos en los cuales se debe transferir y recibir la información en tiempo real (sincrónico) o mediante almacenamiento - envio (asincrónico).", "31.5. Las caracteristicas y formas de relacionamiento entre prestadores de telemedicina (remisar y de referencia) cuando aplique, definiendo los tiempos de respuesta.", "31.6. Procedimiento lidades intramural y extramural domiciliaria", "1. Cumple con los criterios definidos para todos los servicios y adicionalmente:", "Cumple con lo definido en el Decreto 2200 de 2005 compilado en el Decreto 780 de 2016 (Art 2.5.3.10.9) y la Resolución 1403 de 2007 (Manual de condiciones esenciales y procedimientos del servicio farmacéutico Título I Capitulo II Numeral 3.2 y Capítulo III Numeral 1.2), o las normas que los modifiquen, adicionen o sustituyan.", "Modalidad telemedicina\nCategoría interactiva y no interactiva – prestador de referencia\nCategoría telexperticia – prestador remisor – prestador de referencia", "2. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente, cuenta con lo definido con el numeral 1 del servicio farmacéutico.", "3. El talento humano brinda en esta modalidad lo relacionado con la atención farmacéutica a los pacientes que lo requieran, a través de telemedicina – categorías interactiva y no interactiva, telexperticia sincrónico y asincrónico.", "El apoyo a distancia del profesional Químico Farmacéutico no reemplaza el contar con el talento humano definido en el servicio"], "IF": ["Complejidad baja", "Modalidades intramural, extramural domiciliaria, telemedicina categoría telexperticia – prestador remisor", "4. Cumple con los criterios que le sean aplicables a todos los servicios", "5. Cuenta con:", "5.1. Ambiente o área administrativa.", "5.2. Ambiente o área de recepción de medicamentos y dispositivos médicos.", "5.3. Ambiente o área de dispensación de medicamentos y entrega de dispositivos médicos.", "5.4. Ambiente o área de almacenamiento, que garantice las condiciones temperatura y humedad recomendadas por el fabricante. Incluye cadena de frio, cuando aplique.", "5.5. Ambiente o área independiente de medicamentos de control especial cuando aplique, que garantice las condiciones temperatura y humedad recomendadas por el fabricante.", "5.6. Ambiente o área para almacenamiento de productos rechazados, d , telemedicina categoría telexperticia - prestador remisor", "15. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con la siguiente información documentada:", "15.1. Procesos generales que realice, elaborado por el responsable del servicio.", "15.2. Información visible al usuario que prohíba la asesoría farmacológica, por parte de personal diferente al profesional químico farmacéutico o al Profesional en Medicina tratante.", "15.3. Manejo de medicamentos de control especial cuando lo realice.", "15.4. Seguimiento a condiciones ambientales de temperatura y humedad.", "Modalidad telemedicina\nCategoría interactiva y no interactiva – prestador de referencia\nCategoría telexperticia – prestador de referencia", "16. Cumple con los criterios que le sean aplicables de todos los servicios.", "Complejidades mediana y alta", "Modalidades intramural, extramural domiciliaria, telemedicina categoría telexperticia - prestador remisor", "17. Cumple con los criterios definidos para el servicio farmacéutico en baja complejidad y adicionalmente, cuenta con información documentada de cada uno de los procesos especiales que se realicen en el servicio.", "Modalidad telemedicina\nCategoría interactiva y no interactiva – prestador de referencia\nCategoría telexperticia – prestador de referencia", "18. Cumple con los criterios que le sean aplicables de todos los servicios."], "IN": ["Complejidades baja, mediana y alta", "Modalidades intramural, extramural domiciliaria, telemedicina categoría telexperticia - prestador remisor", "21. No aplica.", "Modalidad telemedicina\nCategoría interactiva y no interactiva – prestador de referencia\nCategoría telexperticia – prestador de referencia", "22. No aplica."]}}, "AD-03": {"nombre": "Radiología Odontológica", "grupo": "Apoyo Diagnóstico", "criterios": {"TH": ["Modalidades intramural y extramural unidad móvil", "1. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente, cuenta con:", "Profesional de odontología o tecnólogo en radiología e imágenes diagnósticas, o técnico profesional o auxiliar de odontología o auxiliar en salud oral o auxiliar de higiene oral.", "2. Disponibilidad de profesional de la odontología, si la toma de radiografías la realiza un auxiliar de odontología o auxiliar en salud oral o auxiliar de higiene oral.", "3. La interpretación de las radiografías odontológicas es realizada por el profesional de la odontología.", "Modalidad Telemedicina: Categoría telexperticia - prestador remisor", "4. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente:", "4.1. Cuando se realice telexperticia entre profesionales de la salud cuenta con el profesional de la salud.", "4.2. Cuando realice telexperticia entre personal de salud no profesional y un profesional de la salud, el prestador remisor cuenta con técnico, tecnólogo o auxiliar que atiende presencialmente al usuario.", "Categoría telexperticia - prestador de referencia", "5. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con profesional de la salud que atiende a distancia."], "IF": ["Modalidades intramural, telemedicina - prestador remisor", "6. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con:", "6.1. Ambiente de radiología odontológica, si la tecnología lo requiere. Las dimensiones estarán determinadas según la ficha técnica del equipo.", "6.2. Área de revelado o ambiente oscuro con extracción de gases e iluminación adecuada, con mesón de trabajo con poceta, si la tecnología lo requiere.", "7. Disponibilidad de:", "7.1. Sala de espera", "7.2. Unidades sanitarias discriminadas por sexo.", "Modalidades extramural unidad móvil, telemedicina - prestador remisor", "8. Adicional a lo establecido en la modalidad intramural, cuenta con acceso al servicio de energía eléctrica o fuente de energía alternativa.", "Modalidad telemedicina - prestador de referencia", "9. Cumple con los criterios que le sean aplicables de todos los servicios."], "DO": ["Modalidades intramural, telemedicina - prestador remisor", "10. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente, cuenta con:", "10.1. Equipo generador de radiación ionizante según los exámenes diagnósticos realizados.", "10.2. Elementos de protección radiológica adulto o pediátrico, según oferta, protocolos y especificaciones técnicas del equipo:", "10.2.1. Delantal plomado", "10.2.2. Protector de tiroides", "Modalidades extramural - unidad móvil, telemedicina - prestador remisor.", "11. Adicional a lo establecido en la modalidad intramural, cuenta con:", "11.1. Equipo generador de radiación ionizante según la oferta, cuyas indicaciones del fabricante refieran que está diseñado para ser instalado y operado y mantenido en una unidad móvil.", "11.2. La unidad móvil está dotada con señal luminosa o sonora indicando la presencia de radiación.", "Modalidad telemedicina - prestador remisor", "12. Adicional a lo establecido en el numeral 11 del servicio de radiología odontológica, cuenta con equipo de captura y transmisión de datos e imágenes que asegure las condiciones de visualización de imagen y lectura, el cual puede estar integrado al equipo generador de radiaciones ionizantes.", "Modalidad telemedicina - prestador de referencia", "13. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente, cuenta con pantalla o monitor grado médico para imágenes radiológicas."], "MD": ["Modalidades intramural, extramural unidad móvil, telemedicina - prestador remisor - prestador de referencia", "14. Cumple con los criterios que le sean aplicables de todos los servicios."], "PP": ["Modalidades intramural, telemedicina - prestador remisor", "15. Cumple con los criterios que le sean aplicables de todos los servicios y adicionalmente cuenta con la siguiente información documentada:", "15.1. Toma de exámenes que impl
